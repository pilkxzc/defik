<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оновлення сервера — Trading Arena</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #050b14;
    --surface: #0d1b2e;
    --accent:  #00d4ff;
    --accent2: #0066ff;
    --green:   #00ff88;
    --text:    #c8d8e8;
    --dim:     #4a6785;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Сітка на фоні ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    from { transform: translateY(0); }
    to   { transform: translateY(40px); }
  }

  /* ── Орбітальна анімація ── */
  .orbit-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 0 auto 40px;
  }

  .orbit {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid transparent;
  }

  .orbit-1 {
    border-color: rgba(0,212,255,.25);
    animation: spin 3s linear infinite;
  }
  .orbit-1::after {
    content: '';
    position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
  }

  .orbit-2 {
    inset: 20px;
    border-color: rgba(0,102,255,.3);
    animation: spin 2s linear infinite reverse;
  }
  .orbit-2::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent2), 0 0 16px var(--accent2);
  }

  .orbit-3 {
    inset: 40px;
    border-color: rgba(0,255,136,.2);
    animation: spin 4s linear infinite;
  }
  .orbit-3::after {
    content: '';
    position: absolute;
    top: -3px; right: 10px;
    width: 5px; height: 5px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── Логотип по центру орбіт ── */
  .logo-center {
    position: absolute;
    inset: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px rgba(0,212,255,.5));
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(0,212,255,.4)); }
    50%       { filter: drop-shadow(0 0 20px rgba(0,212,255,.8)); }
  }

  /* ── Картка ── */
  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid rgba(0,212,255,.12);
    border-radius: 20px;
    padding: 48px 52px;
    max-width: 520px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 60px rgba(0,212,255,.06), 0 24px 64px rgba(0,0,0,.6);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  h1 {
    font-size: 1.45rem;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    color: var(--dim);
    font-size: .93rem;
    line-height: 1.6;
    margin-bottom: 36px;
  }

  /* ── Прогрес-бар ── */
  .progress-wrap {
    background: rgba(255,255,255,.05);
    border-radius: 99px;
    height: 4px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    box-shadow: 0 0 8px var(--accent);
    transition: width .3s ease;
  }

  .countdown-text {
    font-size: .8rem;
    color: var(--dim);
    margin-bottom: 32px;
  }
  .countdown-text span {
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Статус-рядки ── */
  .status-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
    background: rgba(0,0,0,.25);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: .82rem;
    font-family: 'Courier New', monospace;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeIn .4s forwards;
    color: var(--dim);
  }
  .status-item.done  { color: var(--green); }
  .status-item.active{ color: var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .dot.spin-dot {
    background: transparent;
    border: 2px solid currentColor;
    border-top-color: transparent;
    animation: spin .7s linear infinite;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 28px;
    font-size: .75rem;
    color: var(--dim);
  }
</style>
</head>
<body>

<div class="card">
  <div class="orbit-wrap">
    <div class="orbit orbit-1"></div>
    <div class="orbit orbit-2"></div>
    <div class="orbit orbit-3"></div>
    <div class="logo-center">TA</div>
  </div>

  <h1>Сервер оновлюється</h1>
  <p class="sub">Ми розгортаємо нову версію платформи.<br>Це займе лічені секунди.</p>

  <div class="progress-wrap">
    <div class="progress-bar" id="pbar"></div>
  </div>
  <p class="countdown-text">Перевірка через <span id="timer">10</span> с</p>

  <div class="status-list" id="log"></div>

  <p class="footer">Trading Arena &mdash; автоматичне відновлення</p>
</div>

<script>
  const INTERVAL = 10; // секунд між спробами
  const ENDPOINT = '/api/health'; // або '/' — що є на сервері

  const pbar  = document.getElementById('pbar');
  const timer = document.getElementById('timer');
  const log   = document.getElementById('log');

  let attempt = 0;

  const messages = [
    'Зупинка старого процесу...',
    'Застосування оновлень...',
    'Встановлення залежностей...',
    'Збірка інтерфейсу...',
    'Запуск сервера...',
  ];

  function addLine(text, state = 'done') {
    const el = document.createElement('div');
    el.className = `status-item ${state}`;
    el.style.animationDelay = '0s';
    const dotClass = state === 'active' ? 'dot spin-dot' : 'dot';
    el.innerHTML = `<span class="${dotClass}"></span><span>${text}</span>`;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  function showProgress(attempt) {
    log.innerHTML = '';
    const show = Math.min(attempt + 1, messages.length);
    for (let i = 0; i < show - 1; i++) {
      const el = addLine(messages[i], 'done');
      el.style.animationDelay = `${i * 0.1}s`;
    }
    if (show <= messages.length) {
      const el = addLine(messages[show - 1], 'active');
      el.style.animationDelay = `${(show - 1) * 0.1}s`;
    }
  }

  async function checkServer() {
    try {
      const res = await fetch(ENDPOINT, { cache: 'no-store', signal: AbortSignal.timeout(4000) });
      if (res.ok || res.status === 401 || res.status === 403 || res.status === 302) {
        // Сервер відповідає — перезавантажуємо
        addLine('Сервер запущено! Перенаправлення...', 'done');
        pbar.style.width = '100%';
        setTimeout(() => location.reload(), 800);
        return true;
      }
    } catch {}
    return false;
  }

  function startCountdown() {
    attempt++;
    showProgress(attempt);

    let left = INTERVAL;
    pbar.style.width = '0%';
    timer.textContent = left;

    const tick = setInterval(async () => {
      left--;
      timer.textContent = left;
      pbar.style.width = `${((INTERVAL - left) / INTERVAL) * 100}%`;

      if (left <= 0) {
        clearInterval(tick);
        const alive = await checkServer();
        if (!alive) startCountdown();
      }
    }, 1000);

    // Перша перевірка одразу
    checkServer();
  }

  startCountdown();
</script>
</body>
</html>
