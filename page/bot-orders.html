            `<span style="color:var(--text-secondary);font-size:12px;">#${o.orderId}</span>`;

        // Info panel
        const fmtDt = d => d ? new Date(d).toLocaleDateString('uk-UA') + ' ' + new Date(d).toLocaleTimeString('uk-UA') : '\u2014';
        document.getElementById('chartInfoPanel').innerHTML = `
            <h4>Деталі ордеру</h4>
            <div class="info-row"><span class="info-label">Order ID</span><span class="info-value">${o.orderId}</span></div>
            <div class="info-row"><span class="info-label">Символ</span><span class="info-value">${o.symbol}</span></div>
            <div class="info-row"><span class="info-label">Сторона</span><span class="info-value"><span class="${badgeSide}">${o.side}</span></span></div>
            <div class="info-row"><span class="info-label">Тип</span><span class="info-value">${(o.type || '').replace(/_/g, ' ')}</span></div>
            <div class="info-row"><span class="info-label">Ціна</span><span class="info-value">$${fmtPrice(o.price)}</span></div>
            ${o.stopPrice > 0 ? `<div class="info-row"><span class="info-label">Stop ціна</span><span class="info-value">$${fmtPrice(o.stopPrice)}</span></div>` : ''}
            ${o.avgPrice > 0 ? `<div class="info-row"><span class="info-label">Сер. ціна</span><span class="info-value">$${fmtPrice(o.avgPrice)}</span></div>` : ''}
            <div class="info-row"><span class="info-label">К-сть</span><span class="info-value">${parseFloat(o.quantity || 0).toFixed(4)}</span></div>
            <div class="info-row"><span class="info-label">Виконано</span><span class="info-value">${parseFloat(o.executedQty || 0).toFixed(4)}</span></div>
            <div class="info-row"><span class="info-label">Статус</span><span class="info-value"><span class="${statusCls}">${o.status}</span></span></div>
            <div class="info-row"><span class="info-label">Створено</span><span class="info-value" style="font-size:10px;">${fmtDt(o.time)}</span></div>
            <div class="info-row"><span class="info-label">Оновлено</span><span class="info-value" style="font-size:10px;">${fmtDt(o.updateTime)}</span></div>
        `;

        // Set active TF button
        document.querySelectorAll('#chartTfGroup .chart-tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === _chartTF));
        document.getElementById('chartShowAllOrders').classList.toggle('active', _showAllOrders);
        document.getElementById('chartShowLevels').classList.toggle('active', _showOrderLevels);
        document.getElementById('chartShowVolume').classList.toggle('active', _showVolume);
        document.getElementById('chartToggleInfo').classList.toggle('active', _showInfoPanel);
        document.getElementById('chartInfoPanel').classList.toggle('hidden', !_showInfoPanel);

        // If chart was already open with same symbol — just navigate, don't reload
        if (wasOpen && prevSymbol === o.symbol && _chartKlines.length > 0) {
            centerOnOrder();
            drawChart();
        } else {
            loadChartKlines();
        }
    };

    // ── Fetch klines ──
    async function loadChartKlines() {
        if (!_chartOrder) return;
        _priceScale = 1; // reset price zoom on new load
        const loader = document.getElementById('chartLoading');
        loader.style.display = 'flex';

        const o = _chartOrder;
        const orderTime = o.time || o.updateTime || Date.now();
        const intervalMs = _tfMs[_chartTF] || 900000;
        const sym = o.symbol || symbol;

        // Fetch 500 bars centered on order
        const startTime = orderTime - 250 * intervalMs;
        const endTime = orderTime + 250 * intervalMs;

        try {
            const parseK = k => ({ time: k[0], open: +k[1], high: +k[2], low: +k[3], close: +k[4], volume: +k[5] });
            const map = new Map();

            // Try futures first, fallback to spot for 1s (or if futures fails)
            const endpoints = _chartTF === '1s'
                ? [
                    `https://fapi.binance.com/fapi/v1/klines`,   // futures (may work on newer API)
                    `https://api.binance.com/api/v3/klines`       // spot fallback
                  ]
                : [`https://fapi.binance.com/fapi/v1/klines`];

            for (const base of endpoints) {
                if (map.size > 0) break; // already got data
                try {
                    const [r1, r2] = await Promise.all([
                        fetch(`${base}?symbol=${sym}&interval=${_chartTF}&startTime=${startTime}&endTime=${orderTime}&limit=500`),
                        fetch(`${base}?symbol=${sym}&interval=${_chartTF}&startTime=${orderTime}&endTime=${endTime}&limit=500`)
                    ]);
                    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
                    if (Array.isArray(d1)) d1.forEach(k => { const p = parseK(k); map.set(p.time, p); });
                    if (Array.isArray(d2)) d2.forEach(k => { const p = parseK(k); map.set(p.time, p); });
                } catch (_) { /* try next endpoint */ }
            }

            _chartKlines = [...map.values()].sort((a, b) => a.time - b.time);
            if (_chartKlines.length === 0) {
                console.warn(`No klines loaded for ${sym} @ ${_chartTF}. Endpoints tried: ${endpoints.join(', ')}`);
            }
        } catch (e) {
            console.error('Chart klines error:', e);
            _chartKlines = [];
        }

        loader.style.display = 'none';

        // Center viewport on order
        centerOnOrder();
        drawChart();
    }

    function centerOnOrder() {
        if (!_chartOrder || _chartKlines.length === 0) return;
        const orderTime = _chartOrder.time || _chartOrder.updateTime || 0;
        let orderIdx = 0;
        let minDist = Infinity;
        _chartKlines.forEach((k, i) => {
            const d = Math.abs(k.time - orderTime);
            if (d < minDist) { minDist = d; orderIdx = i; }
        });
        _chartViewCount = Math.min(200, _chartKlines.length);
        _chartViewStart = Math.max(0, Math.min(orderIdx - Math.floor(_chartViewCount / 2), _chartKlines.length - _chartViewCount));
    }

    // ── Fetch more klines when panning to edges ──
    async function fetchMoreKlines(direction) {
        if (_fetchingMore || _chartKlines.length === 0) return;
        _fetchingMore = true;
        const sym = (_chartOrder?.symbol) || symbol;
        const endpoints = _chartTF === '1s'
            ? ['https://fapi.binance.com/fapi/v1/klines', 'https://api.binance.com/api/v3/klines']
            : ['https://fapi.binance.com/fapi/v1/klines'];
        try {
            let params;
            if (direction === 'left') {
                const earliest = _chartKlines[0].time;
                params = `symbol=${sym}&interval=${_chartTF}&endTime=${earliest - 1}&limit=500`;
            } else {
                const latest = _chartKlines[_chartKlines.length - 1].time;
                params = `symbol=${sym}&interval=${_chartTF}&startTime=${latest + 1}&limit=500`;
            }
            let raw = null;
            for (const base of endpoints) {
                try {
                    const r = await fetch(`${base}?${params}`);
                    const data = await r.json();
                    if (Array.isArray(data) && data.length > 0) { raw = data; break; }
                } catch (_) {}
            }
            if (raw) {
                const newK = raw.map(k => ({ time: k[0], open: +k[1], high: +k[2], low: +k[3], close: +k[4], volume: +k[5] }));
                const map = new Map();
                _chartKlines.forEach(k => map.set(k.time, k));
                newK.forEach(k => map.set(k.time, k));
                const oldLen = _chartKlines.length;
                _chartKlines = [...map.values()].sort((a, b) => a.time - b.time);
                if (direction === 'left') {
                    _chartViewStart += (_chartKlines.length - oldLen);
                }
                drawChart();
            }
        } catch (e) { console.error('Fetch more klines:', e); }
        _fetchingMore = false;
    }

    // ── Draw ──
    function drawChart() {
        const wrap = document.getElementById('chartWrap');
        const canvas = document.getElementById('chartCanvas');
        const dpr = window.devicePixelRatio || 1;
        const W = wrap.clientWidth;
        const H = wrap.clientHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, W, H);

        // Axis zones (subtle bg)
        ctx.fillStyle = '#0d0d0d';
        ctx.fillRect(W - padRight, 0, padRight, H); // price axis
        ctx.fillRect(0, H - padBottom, W, padBottom); // time axis
        // Separator lines
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(W - padRight + 0.5, 0); ctx.lineTo(W - padRight + 0.5, H);
        ctx.moveTo(0, H - padBottom + 0.5); ctx.lineTo(W, H - padBottom + 0.5);
        ctx.stroke();

        if (_chartKlines.length === 0) {
            ctx.fillStyle = '#636363';
            ctx.font = '13px "Plus Jakarta Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Немає даних', W / 2, H / 2);
            return;
        }

        // Visible klines
        const vs = Math.max(0, Math.floor(_chartViewStart));
        const vc = Math.min(_chartViewCount, _chartKlines.length - vs);
        const visible = _chartKlines.slice(vs, vs + vc);
        if (visible.length === 0) return;

        const chartW = W - padLeft - padRight;
        const chartH = H - padTop - padBottom;
        const candleW = Math.max(2, chartW / visible.length);
        const bodyW = Math.max(1, candleW * 0.65);

        // Price range from visible klines (with _priceScale)
        let minP = Infinity, maxP = -Infinity;
        visible.forEach(k => { if (k.low < minP) minP = k.low; if (k.high > maxP) maxP = k.high; });
        const margin = (maxP - minP) * 0.05 || 1;
        minP -= margin; maxP += margin;
        // Apply price scale: >1 = more range (zoomed out), <1 = less range (zoomed in)
        if (_priceScale !== 1) {
            const mid = (maxP + minP) / 2;
            const half = (maxP - minP) / 2 * _priceScale;
            maxP = mid + half;
            minP = mid - half;
        }
        const range = maxP - minP || 1;
        const priceToY = p => padTop + (maxP - p) / range * chartH;
        const idxToX = i => padLeft + i * candleW + candleW / 2;

        // Grid
        const gridLines = 6;
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        for (let i = 0; i <= gridLines; i++) {
            const y = Math.round(padTop + (chartH / gridLines) * i) + 0.5;
            ctx.beginPath(); ctx.moveTo(padLeft, y); ctx.lineTo(W - padRight, y); ctx.stroke();
            const price = maxP - (range / gridLines) * i;
            ctx.fillStyle = '#4a4a4a';
            ctx.font = '10px "JetBrains Mono", monospace';
            ctx.textAlign = 'left';
            ctx.fillText('$' + fmtPrice(price), W - padRight + 6, y + 3);
        }

        // Time labels
        const timeStep = Math.max(1, Math.floor(visible.length / 8));
        ctx.fillStyle = '#4a4a4a';
        ctx.font = '8px "JetBrains Mono", monospace';
        ctx.textAlign = 'center';
        for (let i = 0; i < visible.length; i += timeStep) {
            const dt = new Date(visible[i].time);
            let label;
            if (_chartTF === '1d' || _chartTF === '3d' || _chartTF === '1w' || _chartTF === '1M') {
                label = dt.toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit' });
            } else if (_chartTF === '1s') {
                label = dt.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            } else {
                label = dt.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit' });
            }
            ctx.fillText(label, idxToX(i), H - 5);
        }

        // Volume bars (behind candles)
        if (_showVolume) {
            let maxVol = 0;
            visible.forEach(k => { if (k.volume > maxVol) maxVol = k.volume; });
            if (maxVol > 0) {
                const volH = chartH * 0.18; // 18% of chart height
                visible.forEach((k, i) => {
                    const x = idxToX(i);
                    const isUp = k.close >= k.open;
                    const bh = Math.max(1, (k.volume / maxVol) * volH);
                    ctx.fillStyle = isUp ? 'rgba(16,185,129,0.12)' : 'rgba(239,68,68,0.12)';
                    ctx.fillRect(Math.round(x - bodyW/2), H - padBottom - bh, Math.round(bodyW), bh);
                });
            }
        }

        // Candles
        visible.forEach((k, i) => {
            const x = idxToX(i);
            const isUp = k.close >= k.open;
            const color = isUp ? '#10B981' : '#EF4444';
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(Math.round(x) + 0.5, Math.round(priceToY(k.high)));
            ctx.lineTo(Math.round(x) + 0.5, Math.round(priceToY(k.low)));
            ctx.stroke();
            const yOpen = priceToY(k.open);
            const yClose = priceToY(k.close);
            const bodyTop = Math.min(yOpen, yClose);
            const bodyH = Math.max(1, Math.abs(yClose - yOpen));
            if (isUp) {
                ctx.strokeStyle = color; ctx.lineWidth = 1;
                ctx.strokeRect(Math.round(x - bodyW/2)+0.5, Math.round(bodyTop)+0.5, Math.round(bodyW), Math.round(bodyH));
            } else {
                ctx.fillStyle = color;
                ctx.fillRect(Math.round(x - bodyW/2), Math.round(bodyTop), Math.round(bodyW), Math.round(bodyH));
            }
        });

        // ── Current price line (last visible candle close) ──
        const lastK = visible[visible.length - 1];
        if (lastK) {
            const cpY = priceToY(lastK.close);
            const cpIsUp = lastK.close >= lastK.open;
            if (cpY >= padTop && cpY <= H - padBottom) {
                ctx.setLineDash([2, 2]);
                ctx.strokeStyle = cpIsUp ? 'rgba(16,185,129,0.4)' : 'rgba(239,68,68,0.4)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(padLeft, Math.round(cpY)+0.5); ctx.lineTo(W - padRight, Math.round(cpY)+0.5); ctx.stroke();
                ctx.setLineDash([]);
                // Price tag
                ctx.fillStyle = cpIsUp ? '#10B981' : '#EF4444';
                ctx.font = 'bold 9px "JetBrains Mono", monospace';
                const cpLbl = fmtPrice(lastK.close);
                const cpLw = ctx.measureText(cpLbl).width + 6;
                ctx.fillRect(W - padRight + 2, cpY - 7, cpLw, 14);
                ctx.fillStyle = '#0a0a0a'; ctx.textAlign = 'left';
                ctx.fillText(cpLbl, W - padRight + 5, cpY + 3);
            }
        }

        // ── Order price levels (limit, stop, avg) ──
        if (_showOrderLevels && _chartOrder) {
            const levels = [];
            const oPrice = parseFloat(_chartOrder.price) || 0;
            const oStop = parseFloat(_chartOrder.stopPrice) || 0;
            const oAvg = parseFloat(_chartOrder.avgPrice) || 0;

            if (oPrice > 0) levels.push({ price: oPrice, label: 'Limit ' + fmtPrice(oPrice), color: '#C4B5FD', dash: [6, 4] });
            if (oStop > 0 && oStop !== oPrice) levels.push({ price: oStop, label: 'Stop ' + fmtPrice(oStop), color: '#F59E0B', dash: [4, 4] });
            if (oAvg > 0 && oAvg !== oPrice && oAvg !== oStop) levels.push({ price: oAvg, label: 'Avg ' + fmtPrice(oAvg), color: '#22D3EE', dash: [3, 6] });

            levels.forEach(lv => {
                const ly = priceToY(lv.price);
                if (ly < padTop - 10 || ly > H - padBottom + 10) return;
                ctx.save();
                ctx.setLineDash(lv.dash);
                ctx.strokeStyle = lv.color + '66';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padLeft, Math.round(ly) + 0.5);
                ctx.lineTo(W - padRight, Math.round(ly) + 0.5);
                ctx.stroke();
                ctx.setLineDash([]);
                // Label bg
                ctx.font = 'bold 9px "JetBrains Mono", monospace';
                const tw = ctx.measureText(lv.label).width + 8;
                ctx.fillStyle = lv.color + '22';
                ctx.fillRect(padLeft + 4, ly - 8, tw, 16);
                ctx.strokeStyle = lv.color + '44';
                ctx.lineWidth = 1;
                ctx.strokeRect(padLeft + 4, ly - 8, tw, 16);
                ctx.fillStyle = lv.color;
                ctx.textAlign = 'left';
                ctx.fillText(lv.label, padLeft + 8, ly + 3);
                // Right side price tag
                ctx.fillStyle = lv.color + '33';
                const rpLabel = '$' + fmtPrice(lv.price);
                const rpw = ctx.measureText(rpLabel).width + 8;
                ctx.fillRect(W - padRight + 2, ly - 8, rpw, 16);
                ctx.fillStyle = lv.color;
                ctx.fillText(rpLabel, W - padRight + 6, ly + 3);
                ctx.restore();
            });
        }

        // ── Interpolated X position for a timestamp (sub-candle precision) ──
        const timeToX = (t) => {
            if (visible.length < 2) return idxToX(0);
            const intMs = _tfMs[_chartTF] || (visible[1].time - visible[0].time) || 1;
            // Fractional index based on time
            const fIdx = (t - visible[0].time) / intMs;
            return padLeft + fIdx * candleW + candleW / 2;
        };

        // ── All orders markers ──
        if (_showAllOrders && allOrders.length > 0) {
            const visStart = visible[0].time;
            const visEnd = visible[visible.length - 1].time;
            const intervalMs = _tfMs[_chartTF] || 900000;
            const relevantOrders = allOrders.filter(o => {
                const t = o.time || o.updateTime || 0;
                return t >= visStart - intervalMs && t <= visEnd + intervalMs && o.orderId !== _chartOrder?.orderId;
            });
            relevantOrders.forEach(o => {
                const oTime = o.time || o.updateTime || 0;
                // Use price where order was placed (limit price), fallback to avg/stop
                const oPrice = parseFloat(o.price) > 0 ? parseFloat(o.price) : (o.avgPrice > 0 ? o.avgPrice : (o.stopPrice > 0 ? o.stopPrice : 0));
                if (!oPrice || oPrice <= 0) return;
                const ox = timeToX(oTime);
                if (ox < padLeft - 5 || ox > W - padRight + 5) return;
                const oy = priceToY(oPrice);
                if (oy < padTop - 8 || oy > H - padBottom + 8) return;
                const isBuy = o.side === 'BUY';
                const isFilled = o.status === 'FILLED';
                const markerColor = isBuy ? '#22D3EE' : '#F59E0B';
                const alpha = isFilled ? '99' : '55';

                // Triangle marker
                ctx.fillStyle = markerColor + alpha;
                ctx.beginPath();
                if (isBuy) {
                    ctx.moveTo(ox, oy - 7); ctx.lineTo(ox - 4, oy); ctx.lineTo(ox + 4, oy);
                } else {
                    ctx.moveTo(ox, oy + 7); ctx.lineTo(ox - 4, oy); ctx.lineTo(ox + 4, oy);
                }
                ctx.fill();

                // Short label (only when zoomed in enough)
                if (candleW > 12) {
                    ctx.font = '8px "JetBrains Mono", monospace';
                    ctx.fillStyle = markerColor + alpha;
                    ctx.textAlign = 'center';
                    const shortType = (o.type || '').replace('TAKE_PROFIT', 'TP').replace('STOP_MARKET', 'STP').replace('LIMIT', 'LMT').replace('MARKET', 'MKT').replace(/_/g, '');
                    ctx.fillText(shortType, ox, isBuy ? oy - 10 : oy + 15);
                }
            });
        }

        // ── Main order marker (highlighted) ──
        const orderTime = _chartOrder.time || _chartOrder.updateTime || 0;
        // Use the price where the order was actually placed
        const oPlacePrice = parseFloat(_chartOrder.price) || 0;
        const oFillPrice = parseFloat(_chartOrder.avgPrice) || 0;
        const oStopP = parseFloat(_chartOrder.stopPrice) || 0;
        const orderPrice = oPlacePrice > 0 ? oPlacePrice : (oFillPrice > 0 ? oFillPrice : oStopP);

        if (orderPrice > 0) {
            const ox = timeToX(orderTime);
            const oy = priceToY(orderPrice);
            const isBuy = _chartOrder.side === 'BUY';
            const mColor = isBuy ? '#22D3EE' : '#F59E0B';

            // Vertical dashed line at order time
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = 'rgba(196,181,253,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(Math.round(ox)+0.5, padTop); ctx.lineTo(Math.round(ox)+0.5, H - padBottom); ctx.stroke();
            ctx.setLineDash([]);

            // Horizontal price line
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = mColor + '66';
            ctx.beginPath(); ctx.moveTo(padLeft, Math.round(oy)+0.5); ctx.lineTo(W - padRight, Math.round(oy)+0.5); ctx.stroke();
            ctx.setLineDash([]);

            // Price label on right axis
            ctx.fillStyle = mColor;
            ctx.font = 'bold 9px "JetBrains Mono", monospace';
            const pLabel = '$' + fmtPrice(orderPrice);
            const lw = ctx.measureText(pLabel).width + 6;
            ctx.fillRect(W - padRight + 2, oy - 7, lw, 14);
            ctx.fillStyle = '#0a0a0a'; ctx.textAlign = 'left';
            ctx.fillText(pLabel, W - padRight + 5, oy + 3);

            // Diamond marker
            const ms = Math.min(7, Math.max(4, candleW * 0.5));
            ctx.save(); ctx.translate(ox, oy); ctx.rotate(Math.PI / 4);
            ctx.fillStyle = mColor + '33';
            ctx.strokeStyle = mColor;
            ctx.lineWidth = 1.5;
            ctx.fillRect(-ms, -ms, ms*2, ms*2); ctx.strokeRect(-ms, -ms, ms*2, ms*2);
            ctx.restore();

            // Label above/below
            ctx.fillStyle = mColor;
            ctx.font = 'bold 9px "Plus Jakarta Sans", sans-serif';
            ctx.textAlign = 'center';
            const shortType = (_chartOrder.type || '').replace('TAKE_PROFIT', 'TP').replace('STOP_MARKET', 'STOP').replace(/_/g, ' ');
            ctx.fillText(_chartOrder.side + ' ' + shortType, ox, isBuy ? oy - ms - 6 : oy + ms + 12);

            // If filled at a different price — show fill price as a small dot
            if (oFillPrice > 0 && Math.abs(oFillPrice - orderPrice) / orderPrice > 0.0001) {
                const fillY = priceToY(oFillPrice);
                if (fillY >= padTop && fillY <= H - padBottom) {
                    ctx.beginPath();
                    ctx.arc(ox, fillY, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#10B981';
                    ctx.fill();
                    ctx.font = '8px "JetBrains Mono", monospace';
                    ctx.fillStyle = '#10B981';
                    ctx.fillText('fill $' + fmtPrice(oFillPrice), ox, fillY - 6);
                }
            }
        }

        // ── Crosshair ──
        if (_mouseX >= padLeft && _mouseX <= W - padRight && _mouseY >= padTop && _mouseY <= H - padBottom && !_isDragging) {
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            // Vertical
            ctx.beginPath(); ctx.moveTo(Math.round(_mouseX)+0.5, padTop); ctx.lineTo(Math.round(_mouseX)+0.5, H - padBottom); ctx.stroke();
            // Horizontal
            ctx.beginPath(); ctx.moveTo(padLeft, Math.round(_mouseY)+0.5); ctx.lineTo(W - padRight, Math.round(_mouseY)+0.5); ctx.stroke();
            ctx.setLineDash([]);

            // Crosshair price label
            const crossPrice = maxP - (_mouseY - padTop) / chartH * range;
            ctx.fillStyle = '#2a2a2a';
            const cpLabel2 = '$' + fmtPrice(crossPrice);
            ctx.font = '9px "JetBrains Mono", monospace';
            const cpw = ctx.measureText(cpLabel2).width + 6;
            ctx.fillRect(W - padRight + 2, _mouseY - 7, cpw, 14);
            ctx.fillStyle = '#ccc'; ctx.textAlign = 'left';
            ctx.fillText(cpLabel2, W - padRight + 5, _mouseY + 3);

            // OHLCV info
            const crossIdx = Math.floor((_mouseX - padLeft) / candleW);
            if (crossIdx >= 0 && crossIdx < visible.length) {
                const k = visible[crossIdx];
                const isUp = k.close >= k.open;
                const color = isUp ? '#10B981' : '#EF4444';
                const dt = new Date(k.time);
                const dateStr = _chartTF === '1s'
                    ? dt.toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit' }) + ' ' + dt.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit', second:'2-digit' })
                    : dt.toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit' }) + ' ' + dt.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit' });
                document.getElementById('chartCrosshair').innerHTML =
                    `<span style="color:var(--text-tertiary);">${dateStr}</span>` +
                    `<span>O<span style="color:${color};">${fmtPrice(k.open)}</span></span>` +
                    `<span>H<span style="color:${color};">${fmtPrice(k.high)}</span></span>` +
                    `<span>L<span style="color:${color};">${fmtPrice(k.low)}</span></span>` +
                    `<span>C<span style="color:${color};">${fmtPrice(k.close)}</span></span>` +
                    `<span style="color:var(--text-tertiary);">V${k.volume >= 1e6 ? (k.volume/1e6).toFixed(1)+'M' : k.volume >= 1000 ? (k.volume/1000).toFixed(1)+'k' : k.volume.toFixed(1)}</span>`;
            }
        } else if (!_isDragging) {
            document.getElementById('chartCrosshair').innerHTML = '';
        }

        // Store metadata
        canvas._chart = { visible, vs, vc, candleW, chartW, chartH, minP, maxP, range, priceToY, idxToX };
    }

    // ── Mouse interaction ──
    const chartCanvas = document.getElementById('chartCanvas');

    chartCanvas.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        const rect = this.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const W = rect.width;
        const H = rect.height;

        // Price axis drag (right side)
        if (mx >= W - padRight) {
            _priceAxisDrag = true;
            _priceAxisStartY = e.clientY;
            _priceAxisStartScale = _priceScale;
            chartCanvas.style.cursor = 'ns-resize';
            e.preventDefault();
            return;
        }
        // Time axis drag (bottom)
        if (my >= H - padBottom) {
            _timeAxisDrag = true;
            _timeAxisStartX = e.clientX;
            _timeAxisStartCount = _chartViewCount;
            chartCanvas.style.cursor = 'ew-resize';
            e.preventDefault();
            return;
        }

        _isDragging = true;
        _dragStartX = e.clientX;
        _dragStartViewStart = _chartViewStart;
        chartCanvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', function(e) {
        const rect = chartCanvas.getBoundingClientRect();
        _mouseX = e.clientX - rect.left;
        _mouseY = e.clientY - rect.top;

        // Price axis drag — scale vertically
        if (_priceAxisDrag) {
            const dy = e.clientY - _priceAxisStartY;
            const factor = Math.pow(1.005, dy); // drag down = zoom out, up = zoom in
            _priceScale = Math.max(0.1, Math.min(10, _priceAxisStartScale * factor));
            drawChart();
            return;
        }

        // Time axis drag — scale horizontally
        if (_timeAxisDrag && _chartKlines.length > 0) {
            const dx = e.clientX - _timeAxisStartX;
            const factor = Math.pow(1.005, dx); // drag right = zoom out, left = zoom in
            const newCount = Math.max(20, Math.min(_chartKlines.length, Math.round(_timeAxisStartCount * factor)));
            const dCount = newCount - _chartViewCount;
            _chartViewStart = Math.max(0, Math.min(_chartViewStart - Math.round(dCount * 0.5), _chartKlines.length - newCount));
            _chartViewCount = newCount;
            drawChart();
            if (_chartViewStart <= 5) fetchMoreKlines('left');
            if (_chartViewStart + _chartViewCount >= _chartKlines.length - 5) fetchMoreKlines('right');
            return;
        }

        if (_isDragging && _chartKlines.length > 0) {
            const dx = e.clientX - _dragStartX;
            const W = rect.width;
            const chartW = W - padLeft - padRight;
            const candleW = Math.max(2, chartW / _chartViewCount);
            const shift = -dx / candleW;
            _chartViewStart = Math.max(0, Math.min(_dragStartViewStart + shift, _chartKlines.length - _chartViewCount));
            drawChart();
            // Fetch more when near edge
            if (_chartViewStart <= 5) fetchMoreKlines('left');
            if (_chartViewStart + _chartViewCount >= _chartKlines.length - 5) fetchMoreKlines('right');
        } else if (document.getElementById('chartOverlay').classList.contains('open') && _chartKlines.length > 0) {
            drawChart();
        }
    });

    window.addEventListener('mouseup', function() {
        if (_isDragging || _priceAxisDrag || _timeAxisDrag) {
            _isDragging = false;
            _priceAxisDrag = false;
            _timeAxisDrag = false;
            chartCanvas.style.cursor = 'crosshair';
        }
    });

    // Dynamic cursor based on position
    chartCanvas.addEventListener('mousemove', function(e) {
        if (_isDragging || _priceAxisDrag || _timeAxisDrag) return;
        const rect = this.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        if (mx >= rect.width - padRight) {
            this.style.cursor = 'ns-resize';
        } else if (my >= rect.height - padBottom) {
            this.style.cursor = 'ew-resize';
        } else {
            this.style.cursor = 'crosshair';
        }
    });

    chartCanvas.addEventListener('mouseleave', () => {
        _mouseX = -1; _mouseY = -1;
        if (!_isDragging && !_priceAxisDrag && !_timeAxisDrag && _chartKlines.length > 0) drawChart();
    });

    // Zoom
    chartCanvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        if (_chartKlines.length === 0) return;
        const delta = e.deltaY > 0 ? 1.1 : 0.9;
        const rect = this.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const chartW = rect.width - padLeft - padRight;
        const frac = (mx - padLeft) / chartW; // 0..1 position of mouse in chart

        const newCount = Math.max(20, Math.min(_chartKlines.length, Math.round(_chartViewCount * delta)));
        const dCount = newCount - _chartViewCount;
        _chartViewStart = Math.max(0, Math.min(_chartViewStart - Math.round(dCount * frac), _chartKlines.length - newCount));
        _chartViewCount = newCount;
        drawChart();

        // Fetch more when zoomed out near edges
        if (_chartViewStart <= 5) fetchMoreKlines('left');
        if (_chartViewStart + _chartViewCount >= _chartKlines.length - 5) fetchMoreKlines('right');
    }, { passive: false });

    // Double-click on price axis resets price scale
    chartCanvas.addEventListener('dblclick', function(e) {
        const rect = this.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        if (mx >= rect.width - padRight) {
            _priceScale = 1;
            drawChart();
        }
    });

    // Set cursor
    chartCanvas.style.cursor = 'crosshair';

    // TF buttons
    document.querySelectorAll('#chartTfGroup .chart-tf-btn').forEach(btn => {
        if (!btn.dataset.tf) return;
        btn.addEventListener('click', () => {
            _chartTF = btn.dataset.tf;
            document.querySelectorAll('#chartTfGroup .chart-tf-btn').forEach(b => {
                if (b.dataset.tf) b.classList.toggle('active', b === btn);
            });
            loadChartKlines();
        });
    });

    // Toggle all orders
    document.getElementById('chartShowAllOrders').addEventListener('click', function() {
        _showAllOrders = !_showAllOrders;
        this.classList.toggle('active', _showAllOrders);
        if (_chartKlines.length > 0) drawChart();
    });

    // Toggle order levels
    document.getElementById('chartShowLevels').addEventListener('click', function() {
        _showOrderLevels = !_showOrderLevels;
        this.classList.toggle('active', _showOrderLevels);
        if (_chartKlines.length > 0) drawChart();
    });

    // Toggle volume
    document.getElementById('chartShowVolume').addEventListener('click', function() {
        _showVolume = !_showVolume;
        this.classList.toggle('active', _showVolume);
        if (_chartKlines.length > 0) drawChart();
    });

    // Toggle info panel
    document.getElementById('chartToggleInfo').addEventListener('click', function() {
        _showInfoPanel = !_showInfoPanel;
        this.classList.toggle('active', _showInfoPanel);
        document.getElementById('chartInfoPanel').classList.toggle('hidden', !_showInfoPanel);
        setTimeout(() => { if (_chartKlines.length > 0) drawChart(); }, 220);
    });

    // Reset view (center on order + reset price scale)
    document.getElementById('chartResetView').addEventListener('click', function() {
        _priceScale = 1;
        centerOnOrder();
        drawChart();
    });

    // Close chart
    function closeChart() {
        document.getElementById('chartOverlay').classList.remove('open');
        document.getElementById('chartBackdrop').classList.remove('open');
        _chartOrder = null;
    }
    document.getElementById('chartClose').addEventListener('click', closeChart);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChart(); });

    // Fullscreen toggle
    let _chartFullscreen = false;
    let _chartSavedRect = null;
    document.getElementById('chartFullscreenBtn').addEventListener('click', function() {
        const overlay = document.getElementById('chartOverlay');
        _chartFullscreen = !_chartFullscreen;
        if (_chartFullscreen) {
            _chartSavedRect = { top: overlay.style.top, left: overlay.style.left, width: overlay.style.width, height: overlay.style.height };
            overlay.classList.add('fullscreen');
            this.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
        } else {
            overlay.classList.remove('fullscreen');
            if (_chartSavedRect) {
                overlay.style.top = _chartSavedRect.top; overlay.style.left = _chartSavedRect.left;
                overlay.style.width = _chartSavedRect.width; overlay.style.height = _chartSavedRect.height;
            }
            this.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
        }
        setTimeout(() => { if (_chartKlines.length > 0) drawChart(); }, 50);
    });

    // Pin toggle
    document.getElementById('chartPinBtn').addEventListener('click', function() {
        _chartPinned = !_chartPinned;
        this.classList.toggle('pinned', _chartPinned);
        document.getElementById('chartOverlay').classList.toggle('pinned', _chartPinned);
    });

    // Drag modal by header
    let _modalDragging = false, _modalDragOX = 0, _modalDragOY = 0;
    document.getElementById('chartHeader').addEventListener('dblclick', function(e) {
        if (e.target.closest('button') || e.target.closest('.chart-tf-group')) return;
        document.getElementById('chartFullscreenBtn').click();
    });
    document.getElementById('chartHeader').addEventListener('mousedown', function(e) {
        if (e.target.closest('button') || e.target.closest('.chart-tf-group') || _chartFullscreen || _chartPinned) return;
        _modalDragging = true;
        const overlay = document.getElementById('chartOverlay');
        const rect = overlay.getBoundingClientRect();
        _modalDragOX = e.clientX - rect.left;
        _modalDragOY = e.clientY - rect.top;
        e.preventDefault();
    });
    window.addEventListener('mousemove', function(e) {
        if (_modalDragging) {
            const overlay = document.getElementById('chartOverlay');
            overlay.style.left = Math.max(0, e.clientX - _modalDragOX) + 'px';
            overlay.style.top = Math.max(0, e.clientY - _modalDragOY) + 'px';
        }
    });
    window.addEventListener('mouseup', function() { _modalDragging = false; });

    // Resize handle
    let _modalResizing = false, _resizeStartX = 0, _resizeStartY = 0, _resizeStartW = 0, _resizeStartH = 0;
    document.getElementById('chartResizeHandle').addEventListener('mousedown', function(e) {
        if (_chartFullscreen || _chartPinned) return;
        _modalResizing = true;
        const overlay = document.getElementById('chartOverlay');
        const rect = overlay.getBoundingClientRect();
        _resizeStartX = e.clientX; _resizeStartY = e.clientY;
        _resizeStartW = rect.width; _resizeStartH = rect.height;
        e.preventDefault(); e.stopPropagation();
    });
    window.addEventListener('mousemove', function(e) {
        if (_modalResizing) {
            const overlay = document.getElementById('chartOverlay');
            const w = Math.max(380, _resizeStartW + (e.clientX - _resizeStartX));
            const h = Math.max(260, _resizeStartH + (e.clientY - _resizeStartY));
            overlay.style.width = w + 'px';
            overlay.style.height = h + 'px';
            if (_chartKlines.length > 0) drawChart();
        }
    });
    window.addEventListener('mouseup', function() { _modalResizing = false; });

    // Window resize
    window.addEventListener('resize', () => {
        if (_chartOrder && _chartKlines.length > 0) drawChart();
    });

    // Sortable headers
    document.querySelectorAll('.orders-tbl th.sortable').forEach(th => {
        th.addEventListener('click', () => {
            const key = th.dataset.sort;
            if (sortKey === key) {
                sortDir = sortDir === 'desc' ? 'asc' : 'desc';
            } else {
                sortKey = key;
                sortDir = 'desc';
            }
            document.querySelectorAll('.orders-tbl th.sortable').forEach(h => h.classList.remove('active-sort', 'asc', 'desc'));
            th.classList.add('active-sort', sortDir);
            currentPage = 1;
            applyFilters();
        });
    });

    // Side filter
    document.querySelectorAll('#sideFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            sideFilter = btn.dataset.side;
            document.querySelectorAll('#sideFilters .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
            currentPage = 1;
            applyFilters();
        });
    });

    // Status filter
    document.querySelectorAll('#statusFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            statusFilter = btn.dataset.status;
            document.querySelectorAll('#statusFilters .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
            currentPage = 1;
            applyFilters();
        });
    });

    // Type filter
    document.querySelectorAll('#typeFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            typeFilter = btn.dataset.type;
            document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
            currentPage = 1;
            applyFilters();
        });
    });

    // Time filter
    document.getElementById('timeFilter').addEventListener('change', function() {
        timeFilter = parseInt(this.value);
        currentPage = 1;
        applyFilters();
    });

    // Search
    let searchDebounce;
    document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
            searchQuery = this.value.trim();
            currentPage = 1;
            applyFilters();
        }, 200);
    });

})();
</script>
</body>
</html>
