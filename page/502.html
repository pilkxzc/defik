<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yamato — Оновлення</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080808;
    --surface:  #141414;
    --surface2: #1C1C1C;
    --accent:   #10B981;
    --accent-d: #0d9268;
    --white:    #FFFFFF;
    --t1:       #FFFFFF;
    --t2:       #A1A1A1;
    --t3:       #636363;
    --border:   rgba(255,255,255,0.05);
    --radius-full: 9999px;
    --radius-lg: 24px;
    --radius-md: 16px;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--t1);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Логотип ── */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 40px;
    color: var(--t1);
    text-decoration: none;
  }
  .brand img { width: 28px; height: 28px; }

  /* ── Картка ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px;
    width: 100%;
    max-width: 460px;
  }

  /* ── Іконка зверху ── */
  .icon-wrap {
    width: 56px;
    height: 56px;
    background: rgba(16,185,129,.1);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
  }
  .icon-wrap svg { width: 26px; height: 26px; color: var(--accent); }
  /* пульсуюче кільце */
  .icon-wrap::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: calc(var(--radius-md) + 1px);
    border: 1px solid var(--accent);
    opacity: 0;
    animation: ring 2.4s ease-out infinite;
  }
  @keyframes ring {
    0%   { transform: scale(1);    opacity: .6; }
    100% { transform: scale(1.35); opacity: 0;  }
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -.3px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--t2);
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* ── Термінал ── */
  .terminal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
    min-height: 120px;
  }
  .log-line {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateY(4px);
    animation: slideIn .3s forwards;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .log-line .prefix { color: var(--t3); flex-shrink: 0; }
  .log-line.done   .msg { color: var(--t2); }
  .log-line.active .msg { color: var(--accent); }
  .log-line.done   .dot { background: var(--accent); }
  .log-line.active .dot { background: var(--accent); animation: blink .8s step-end infinite; }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--t3);
    flex-shrink: 0;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Прогрес + таймер ── */
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .progress-wrap {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: var(--radius-full);
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: var(--radius-full);
    transition: width .25s linear;
  }
  .timer-pill {
    background: var(--surface2);
    border-radius: var(--radius-full);
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--t2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .timer-pill span { color: var(--accent); }
</style>
</head>
<body>

<a class="brand" href="/">
  <img src="/logo.svg" alt="Yamato">
  Yamato
</a>

<div class="card">

  <div class="icon-wrap">
    <!-- server icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="8" rx="2"/>
      <rect x="2" y="14" width="20" height="8" rx="2"/>
      <line x1="6" y1="6" x2="6.01" y2="6"/>
      <line x1="6" y1="18" x2="6.01" y2="18"/>
    </svg>
  </div>

  <h1>Сервер оновлюється</h1>
  <p class="subtitle">Розгортаємо нову версію Yamato.<br>Сторінка оновиться автоматично.</p>

  <div class="terminal" id="terminal"></div>

  <div class="footer-row">
    <div class="progress-wrap">
      <div class="progress-bar" id="pbar"></div>
    </div>
    <div class="timer-pill">через <span id="timer">10</span> с</div>
  </div>

</div>

<script>
  const INTERVAL = 10;
  const steps = [
    'Зупинка процесу...',
    'Застосування оновлень...',
    'npm install...',
    'Збірка інтерфейсу...',
    'Запуск сервера...',
  ];

  const terminal = document.getElementById('terminal');
  const pbar     = document.getElementById('pbar');
  const timerEl  = document.getElementById('timer');
  let attempt    = 0;

  function addLine(text, state) {
    const time = new Date().toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const el = document.createElement('div');
    el.className = `log-line ${state}`;
    el.style.animationDelay = '0s';
    el.innerHTML = `<span class="dot"></span><span class="prefix">${time}</span><span class="msg">${text}</span>`;
    terminal.appendChild(el);
    return el;
  }

  function renderTerminal(attempt) {
    terminal.innerHTML = '';
    const show = Math.min(attempt + 1, steps.length);
    for (let i = 0; i < show - 1; i++) {
      const el = addLine(steps[i], 'done');
      el.style.animationDelay = `${i * 0.08}s`;
    }
    if (show <= steps.length) {
      const el = addLine(steps[show - 1], 'active');
      el.style.animationDelay = `${(show - 1) * 0.08}s`;
    }
  }

  async function checkServer() {
    try {
      const res = await fetch('/', { cache: 'no-store', signal: AbortSignal.timeout(4000) });
      if (res.ok || res.status === 401 || res.status === 302 || res.status === 403) {
        addLine('Сервер запущено — перенаправлення...', 'active');
        pbar.style.width = '100%';
        setTimeout(() => location.reload(), 600);
        return true;
      }
    } catch {}
    return false;
  }

  function startCycle() {
    attempt++;
    renderTerminal(attempt);
    pbar.style.width = '0%';

    let left = INTERVAL;
    timerEl.textContent = left;

    const tick = setInterval(async () => {
      left--;
      timerEl.textContent = left;
      pbar.style.width = `${((INTERVAL - left) / INTERVAL) * 100}%`;
      if (left <= 0) {
        clearInterval(tick);
        const ok = await checkServer();
        if (!ok) startCycle();
      }
    }, 1000);

    checkServer(); // перша перевірка одразу
  }

  startCycle();
</script>
</body>
</html>
