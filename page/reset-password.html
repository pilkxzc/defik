<html lang="uk"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamato - Скидання пароля</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #080808;
            --surface: #141414;
            --surface-secondary: #1C1C1C;
            --accent-primary: #10B981;
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1A1;
            --text-tertiary: #636363;
            --radius-xl: 32px;
            --radius-md: 16px;
            --radius-full: 9999px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 48px;
            max-width: 440px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; font-weight: 700; font-size: 18px; }
        .brand img { width: 28px; height: 28px; border-radius: 50%; }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input {
            width: 100%; background: var(--surface-secondary); border: 1px solid rgba(255,255,255,0.03);
            border-radius: var(--radius-md); padding: 14px 20px; color: var(--text-primary);
            font-family: inherit; font-size: 15px; outline: none; transition: 0.2s;
        }
        .form-input:focus { border-color: rgba(16,185,129,0.4); background: #222; }

        .btn-submit {
            width: 100%; background: var(--accent-primary); color: white; border: none;
            padding: 16px; border-radius: var(--radius-md); font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(16,185,129,0.2); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg { color: #EF4444; text-align: center; margin-top: 12px; font-size: 14px; display: none; }
        .success-msg { color: #10B981; text-align: center; margin-top: 12px; font-size: 14px; display: none; }

        .back-link { display: block; text-align: center; margin-top: 24px; color: var(--text-tertiary); font-size: 13px; text-decoration: none; }
        .back-link:hover { color: var(--text-secondary); }

        @media (max-width: 480px) {
            .reset-card { padding: 32px 20px; border-radius: 20px; }
            h1 { font-size: 20px; }
            .form-input { padding: 12px 16px; font-size: 14px; }
            .btn-submit { padding: 14px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="brand">
            <img src="/logo.svg" alt="Yamato">
            YAMATO
        </div>

        <h1>Новий пароль</h1>
        <p class="subtitle">Введіть новий пароль для вашого акаунту</p>

        <form id="resetForm">
            <div class="form-group">
                <label class="form-label">Новий пароль</label>
                <input type="password" class="form-input" id="newPassword" placeholder="Мінімум 6 символів" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">Підтвердити пароль</label>
                <input type="password" class="form-input" id="confirmPassword" placeholder="Повторіть пароль" required minlength="6">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Скинути пароль</button>
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
        </form>

        <a href="/login" class="back-link">Повернутися до входу</a>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            document.getElementById('errorMsg').textContent = 'Невалідне або відсутнє посилання для скидання пароля.';
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const submitBtn = document.getElementById('submitBtn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (newPassword.length < 6) {
                errorMsg.textContent = 'Пароль має містити мінімум 6 символів';
                errorMsg.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Паролі не збігаються';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Зачекайте...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    successMsg.textContent = 'Пароль успішно змінено! Перенаправлення...';
                    successMsg.style.display = 'block';
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    errorMsg.textContent = data.error || 'Не вдалося скинути пароль';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Скинути пароль';
                }
            } catch (err) {
                errorMsg.textContent = 'Помилка мережі. Спробуйте ще раз.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Скинути пароль';
            }
        });
    </script>

</body></html>
