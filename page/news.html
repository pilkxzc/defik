<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Крипто-новини на Yamato — актуальні події та аналіз ринку криптовалют.">

<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-size:24px;line-height:1;color:inherit;display:inline-flex;align-items:center;justify-content:center;}</style>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-green: #10B981;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        .scroll-y {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .scroll-y::-webkit-scrollbar { width: 6px; }
        .scroll-y::-webkit-scrollbar-track { background: transparent; }
        .scroll-y::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .app-container {
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: 60px 1fr;
        }

        .header-bar {
            grid-column: 2;
            grid-row: 1;
        }

        .main-content {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .news-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
            flex: 1;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .news-title {
            font-size: 24px;
            font-weight: 700;
        }

        .news-filters {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .filter-btn:hover:not(.active) {
            background: var(--surface-secondary);
            color: var(--text-primary);
        }

        #newsList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
            align-content: start;
        }

        .news-card {
            background: var(--surface-secondary);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .news-card:hover {
            border-color: rgba(255,255,255,0.14);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .news-card-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            flex-shrink: 0;
        }

        .news-card-image-placeholder {
            width: 100%;
            height: 6px;
            flex-shrink: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
        }

        .news-card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }

        .news-card-header {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .news-category {
            padding: 3px 9px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .news-category.update { background: rgba(140, 168, 255, 0.15); color: var(--accent-blue); }
        .news-category.market { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .news-category.alert { background: rgba(255, 59, 48, 0.15); color: #EF4444; }
        .news-category.feature { background: rgba(245, 158, 11, 0.15); color: #F59E0B; }

        .source-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .source-badge.binance { background: rgba(240,185,11,0.15); color: #F0B90B; }
        .source-badge.bybit   { background: rgba(247,166,0,0.15);  color: #F7A600; }
        .source-badge.okx     { background: rgba(255,255,255,0.08); color: #e0e0e0; }

        .source-dot {
            width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
        }
        .source-dot.binance { background: #F0B90B; }
        .source-dot.bybit   { background: #F7A600; }
        .source-dot.okx     { background: #aaa; }

        .source-filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .news-time {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: auto;
            padding-top: 4px;
        }

        .news-card-title {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card-excerpt {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        svg { stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        @media (max-width: 768px) {
            body {
                padding: 0;
                padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
            }
            .app-container {
                grid-template-columns: 1fr !important;
                grid-template-rows: auto 1fr !important;
                gap: 0;
                border-radius: 0;
            }
            .header-bar { grid-column: 1 !important; grid-row: 1 !important; }
            .main-content {
                grid-column: 1 !important;
                grid-row: 2 !important;
                padding: 12px;
            }
            .news-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .news-filters {
                flex-wrap: wrap;
                gap: 6px;
            }
            .filter-btn {
                padding: 8px 14px;
                font-size: 13px;
                min-height: 36px;
            }
            .news-title { font-size: 22px; }
            #newsList {
                grid-template-columns: 1fr;
            }
            .news-card {
                border-radius: 20px;
            }
            .news-card-image { height: 180px; }
        }
        @media (max-width: 480px) {
            .news-card { border-radius: 16px; }
            .news-card-title { font-size: 14px; }
            .news-card-image { height: 150px; }
        }
    </style>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        let newsData = [];
        let currentFilter = 'all';
        let currentSource = 'all';
        let isLoading = false;

        const SOURCE_LABELS = { binance: 'Binance', bybit: 'Bybit', okx: 'OKX' };
        const CATEGORY_LABELS = { market: 'Лістинг', alert: 'Сповіщення', update: 'Оновлення', feature: 'Фіча' };

        async function loadNews(filter = currentFilter, source = currentSource) {
            if (isLoading) return;
            isLoading = true;
            currentFilter = filter;
            currentSource = source;

            const container = document.getElementById('newsList');
            container.innerHTML = `
                <div style="text-align: center; padding: 40px 20px; color: var(--text-tertiary);">
                    <div style="width: 32px; height: 32px; border: 3px solid var(--surface-secondary); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
                    <div style="font-size: 14px;">Завантаження новин...</div>
                </div>
            `;

            try {
                const params = new URLSearchParams();
                if (filter !== 'all') params.set('category', filter);
                if (source !== 'all') params.set('source', source);
                params.set('limit', '100');

                const response = await fetch(`/api/news?${params}`);
                if (!response.ok) throw new Error('Failed to fetch news');

                const data = await response.json();
                newsData = data.news || [];
                renderNews();
            } catch (error) {
                console.error('Load news error:', error);
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px; color: var(--text-tertiary);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="margin-bottom: 16px; opacity: 0.5;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <div style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">Не вдалося завантажити новини</div>
                        <div style="font-size: 14px;">Спробуйте пізніше</div>
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        function sourceBadgeHtml(source) {
            if (!source || !SOURCE_LABELS[source]) return '';
            return `<span class="source-badge ${source}"><span class="source-dot ${source}"></span>${SOURCE_LABELS[source]}</span>`;
        }

        function renderNews() {
            const container = document.getElementById('newsList');

            if (newsData.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px; color: var(--text-tertiary);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="margin-bottom: 16px; opacity: 0.5;"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path></svg>
                        <div style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">Новини не знайдено</div>
                        <div style="font-size: 14px;">Спробуйте обрати інший фільтр або джерело</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = newsData.map(news => `
                <div class="news-card" onclick="openNews(${news.id})">
                    ${news.imageUrl
                        ? `<img src="${news.imageUrl}" class="news-card-image" alt="" onerror="this.outerHTML='<div class=\\'news-card-image-placeholder\\'></div>'">`
                        : '<div class="news-card-image-placeholder"></div>'
                    }
                    <div class="news-card-body">
                        <div class="news-card-header">
                            <span class="news-category ${news.category}">${CATEGORY_LABELS[news.category] || news.category}</span>
                            ${sourceBadgeHtml(news.source)}
                        </div>
                        <div class="news-card-title">${escapeHtml(news.title)}</div>
                        ${news.excerpt ? `<div class="news-card-excerpt">${escapeHtml(news.excerpt)}</div>` : ''}
                        <div class="news-time">${news.time}</div>
                    </div>
                </div>
            `).join('');
        }

        const COLLECT_BTN_IDLE = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Оновити зараз`;
        const COLLECT_BTN_SPIN = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:4px;animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Збираємо...`;

        async function collectNews() {
            const btn = document.getElementById('collectNowBtn');
            if (!btn || btn.disabled) return;
            btn.disabled = true;
            btn.innerHTML = COLLECT_BTN_SPIN;
            try {
                // Server responds immediately — collection runs in background
                await fetch('/api/admin/news/collect', { method: 'POST', credentials: 'include' });
                // Wait 12s for background collection to finish, then reload
                await new Promise(r => setTimeout(r, 12000));
                await loadNews();
            } catch(e) {}
            btn.disabled = false;
            btn.innerHTML = COLLECT_BTN_IDLE;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openNews(id) {
            const news = newsData.find(n => n.id === id);
            if (news) {
                // Show news detail modal
                showNewsDetail(news);
            }
        }

        function showNewsDetail(news) {
            // Create modal if not exists
            let modal = document.getElementById('newsDetailModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'newsDetailModal';
                modal.className = 'modal-overlay';
                modal.innerHTML = `
                    <div class="modal-card" style="
                        width: min(640px, 92vw);
                        max-height: 82vh;
                        overflow-y: auto;
                        background: var(--surface);
                        border: 1px solid rgba(255,255,255,0.1);
                        border-radius: 24px;
                        box-shadow: 0 16px 48px rgba(0,0,0,0.5);
                        display: flex;
                        flex-direction: column;
                        overflow: hidden;
                    ">
                        <div id="newsDetailImage" style="flex-shrink:0;"></div>
                        <div style="padding: 24px; overflow-y: auto; flex: 1;">
                            <div class="modal-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                                <div style="display:flex;gap:8px;align-items:center;">
                                    <span id="newsDetailCategory" class="news-category"></span>
                                    <span id="newsDetailSource"></span>
                                </div>
                                <button class="modal-close" onclick="closeNewsDetail()" style="
                                    width:32px;height:32px;border-radius:50%;background:var(--surface-secondary);
                                    border:none;color:var(--text-secondary);cursor:pointer;display:flex;
                                    align-items:center;justify-content:center;flex-shrink:0;
                                ">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </button>
                            </div>
                            <h2 id="newsDetailTitle" style="font-size: 20px; font-weight: 700; margin-bottom: 10px; line-height: 1.35;"></h2>
                            <div id="newsDetailMeta" style="font-size: 12px; color: var(--text-tertiary); margin-bottom: 20px;"></div>
                            <div id="newsDetailContent" style="font-size: 14px; line-height: 1.75; color: var(--text-secondary);"></div>
                        </div>
                    </div>
                `;
                modal.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
                    display: flex; align-items: center; justify-content: center;
                    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
                `;
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) closeNewsDetail();
                });
                document.body.appendChild(modal);
            }

            // Populate modal
            document.getElementById('newsDetailCategory').textContent = CATEGORY_LABELS[news.category] || news.category;
            document.getElementById('newsDetailCategory').className = `news-category ${news.category}`;
            document.getElementById('newsDetailSource').innerHTML = sourceBadgeHtml(news.source);
            document.getElementById('newsDetailTitle').textContent = news.title;
            document.getElementById('newsDetailMeta').textContent = `${news.authorName || 'Yamato Team'} • ${news.time}`;

            const imageContainer = document.getElementById('newsDetailImage');
            if (news.imageUrl) {
                imageContainer.innerHTML = `<img src="${news.imageUrl}" style="width:100%;height:200px;object-fit:cover;display:block;" alt="" onerror="this.parentElement.style.display='none'">`;
                imageContainer.style.display = 'block';
            } else {
                imageContainer.style.display = 'none';
            }

            document.getElementById('newsDetailContent').innerHTML = (news.content || news.excerpt || '').replace(/\n/g, '<br>');

            // Show modal
            modal.style.opacity = '1';
            modal.style.pointerEvents = 'all';
        }

        function closeNewsDetail() {
            const modal = document.getElementById('newsDetailModal');
            if (modal) {
                modal.style.opacity = '0';
                modal.style.pointerEvents = 'none';
            }
        }

        // Category filter buttons
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadNews(btn.dataset.filter, currentSource);
            });
        });

        // Source filter buttons
        document.querySelectorAll('.filter-btn[data-source]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn[data-source]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadNews(currentFilter, btn.dataset.source);
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Load news
            loadNews();

            // Load user data
            try {
                const response = await fetch('/api/auth/me', { credentials: 'include' });
                if (response.ok) {
                    const user = await response.json();

                    // Update balance
                    document.getElementById('headerBalance').textContent = `$${(user.balance || user.demoBalance || 0).toFixed(2)}`;

                    // Update avatar
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = '';
                        avatarEl.style.backgroundImage = `url(${user.avatar})`;
                        avatarEl.style.backgroundSize = 'cover';
                        avatarEl.style.backgroundPosition = 'center';
                    } else {
                        avatarEl.style.backgroundImage = 'none';
                        avatarEl.textContent = (user.fullName || 'U').charAt(0).toUpperCase();
                    }

                    // Show admin link if needed
                    if (user.role === 'admin' || user.role === 'moderator') {
                        const el = document.getElementById('adminNavLink');
                        if (el) el.classList.remove('admin-hidden');
                        // Show "collect now" button for admins
                        const collectBtn = document.getElementById('collectNowBtn');
                        if (collectBtn) collectBtn.style.display = '';
                    }
                }
            } catch (error) {
                console.log('User not logged in');
            }
        });
    </script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
