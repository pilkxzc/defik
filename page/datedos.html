    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Yamato — торговий термінал з графіками в реальному часі та підключенням до Binance Futures.">
    <title>Yamato - Торгова платформа</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            height: 100vh;
            max-height: 100vh;
            display: flex;
            overflow: hidden;
            padding: 12px;
            margin: 0;
        }

        .app-container {
            display: grid;
            grid-template-columns: auto var(--col-market, 280px) 1fr var(--col-trade, 280px);
            grid-template-rows: 60px 1fr;
            gap: 12px;
            width: 100%;
            height: 100%;
            max-height: calc(100vh - 24px);
            overflow: hidden;
        }

        .app-container.hide-market { grid-template-columns: auto 0px 1fr var(--col-trade, 280px); }
        .app-container.hide-market .market-panel { display: none; }
        .app-container.hide-trade  { grid-template-columns: auto var(--col-market, 280px) 1fr 0px; }
        .app-container.hide-trade  .trade-panel  { display: none; }
        .app-container.hide-market.hide-trade { grid-template-columns: auto 0px 1fr 0px; }

        /* Responsive adjustments */
        @media (max-width: 1400px) {
            .app-container {
                --col-market: 240px;
                --col-trade: 260px;
            }
        }

        @media (max-width: 1200px) {
            .app-container {
                --col-market: 220px;
                --col-trade: 240px;
                gap: 10px;
            }
        }

        @media (max-height: 800px) {
            body {
                padding: 8px;
            }
            .app-container {
                grid-template-rows: 50px 1fr;
                gap: 8px;
            }
            .card {
                padding: 16px;
            }
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .scroll-y {
            overflow-y: auto;
            scrollbar-width: none;
        }
        .scroll-y::-webkit-scrollbar {
            display: none;
        }

        .nav-sidebar {
            grid-row: 1 / -1;
            grid-column: 1;
            background: var(--surface);
            border-radius: var(--radius-full);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 16px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-item {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item.active {
            background: var(--accent-primary);
            color: var(--accent-white);
        }

        .nav-item:hover:not(.active) {
            background: var(--surface-secondary);
            color: var(--text-primary);
        }

        .header-bar {
            grid-column: 2 / -1;
            grid-row: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-pill {
            background: var(--surface);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-pill {
            background: var(--accent-primary);
            padding: 6px 6px 6px 16px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-soft);
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #1C1C1C 0%, #2a2a2a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-primary);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .market-panel {
            grid-column: 2;
            grid-row: 2;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
        }

        .icon-btn-sm {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .market-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
        }

        .market-item {
            background: var(--surface-secondary);
            padding: 10px 12px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            flex-shrink: 0;
        }

        .market-item:hover {
            background: #252525;
        }

        .market-item.active {
            border-color: var(--accent-primary);
            background: rgba(16, 185, 129, 0.07);
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coin-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .coin-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .coin-name {
            display: flex;
            flex-direction: column;
        }

        .coin-ticker {
            font-weight: 700;
            font-size: 13px;
        }

        .coin-sub {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .coin-price {
            text-align: right;
            display: flex;
            flex-direction: column;
        }

        .price-val {
            font-weight: 600;
            font-size: 13px;
        }

        .price-change {
            font-size: 10px;
            color: #10B981;
        }
        .price-change.neg { color: #EF4444; }

        .chart-panel {
            grid-column: 3;
            grid-row: 2;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chart-panel.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            border-radius: 0;
            grid-column: auto;
            grid-row: auto;
            margin: 0;
        }

        .chart-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .chart-stat {
            display: flex;
            flex-direction: column;
        }
        .stat-label { font-size: 9px; color: var(--text-secondary); }
        .stat-val { font-size: 12px; font-weight: 600; }

        .chart-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .chart-btn {
            width: 36px;
            height: 36px;
            background: var(--surface-secondary);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
        }

        .chart-btn:hover {
            background: var(--accent-primary);
            color: white;
        }

        .chart-container {
            flex: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            min-height: 300px;
            height: 100%;
        }

        /* Watermark branding on chart */
        .klinecharts-pro-watermark {
            font-family: 'Orbitron', sans-serif !important;
            font-size: clamp(48px, 6vw, 88px) !important;
            font-weight: 900 !important;
            letter-spacing: 0.18em !important;
            text-transform: uppercase !important;
            color: rgba(255, 255, 255, 0.035) !important;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.035) !important;
            user-select: none;
            pointer-events: none;
        }

        .chart-panel.fullscreen .chart-container {
            min-height: calc(100vh - 80px);
        }

        .trade-panel {
            grid-column: 4;
            grid-row: 2;
            background: transparent;
            padding: 0;
            gap: 10px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: none;
            min-height: 0;
        }
        .trade-panel::-webkit-scrollbar { display: none; }

        .order-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px;
            flex: 0 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .wallet-card {
            background: var(--surface-secondary);
            border-radius: var(--radius-lg);
            padding: 16px;
            color: var(--text-primary);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--accent-primary);
        }

        .toggle-switch {
            background: var(--surface-secondary);
            border-radius: var(--radius-full);
            padding: 3px;
            display: flex;
            margin-bottom: 12px;
        }

        .toggle-option {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
        }

        .toggle-option.active {
            background: var(--accent-primary);
            color: white;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            color: var(--text-secondary);
        }

        .input-pill {
            background: var(--surface-secondary);
            border-radius: var(--radius-full);
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
        }

        .input-pill input {
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            width: 60%;
            outline: none;
            color: white;
        }

        .suffix {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 600;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
            width: 100%;
            height: 44px;
            border-radius: var(--radius-full);
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .order-book-list {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .ob-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .ob-row.sell { background: rgba(239, 68, 68, 0.1); color: #EF4444; }
        .ob-row.buy { background: rgba(16, 185, 129, 0.1); color: #10B981; }

        .ob-price { font-weight: 600; }
        .ob-amount { color: var(--text-primary); opacity: 0.6; }

        svg {
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ==================== MOBILE ==================== */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
                padding: 0;
                padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
            }
            .app-container {
                grid-template-columns: 1fr !important;
                grid-template-rows: auto 1fr auto !important;
                gap: 0;
                height: auto;
                max-height: none;
                overflow: visible;
                border-radius: 0;
            }
            .header-bar {
                grid-column: 1 !important;
                grid-row: 1 !important;
            }
            .market-panel { display: none; }
            .chart-panel {
                grid-column: 1 !important;
                grid-row: 2 !important;
                min-height: 55vh;
                border-radius: 0 !important;
            }
            .chart-panel .card { border-radius: 0; border-left: none; border-right: none; }
            .trade-panel {
                grid-column: 1 !important;
                grid-row: 3 !important;
                padding: 0 12px 12px;
            }
            .chart-header {
                flex-wrap: wrap;
                gap: 6px;
                padding: 10px 12px;
            }
            .tf-btns {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                flex-shrink: 0;
                max-width: 100%;
            }
            .tf-btns::-webkit-scrollbar { display: none; }
            .tf-btns button, .tf-btns .tf-btn {
                min-height: 36px;
                min-width: 36px;
            }
            .trade-panel .card {
                border-radius: 20px;
                padding: 20px 16px;
            }
            .input-pill {
                height: 48px;
                font-size: 16px;
                border-radius: 14px;
            }
            .btn-primary, .trade-panel button[type] {
                height: 48px;
                border-radius: 14px;
                font-size: 15px;
            }
        }
        @media (max-width: 480px) {
            .chart-panel { min-height: 45vh; }
        }

    </style>

    <script type="text/javascript">
        // ================================
        // GLOBAL STATE (shared across all scripts)
        // ================================
        window.tvWidget = null;
        window.currentChartSymbol = 'BINANCE:BTCUSDT';
        window.allMarkets = [];
        window.activeQuoteMarkets = [];  // current quote's market data (may differ from allMarkets for non-USDT)
        window.currentTicker = 'BTC';
        window.currentPrice = 0;
        window.orderSide = 'buy';
        window.orderType = 'market';
        window.userBalance = 0;
        window.quoteCurrency = 'USDT';
        window.quoteCurrencyPrice = 1;

        // Crypto logo helper — jsdelivr primary, coincap fallback, letter last resort
        window.getCoinLogoHtml = function(symbol, size) {
            size = size || 32;
            var s = symbol.toLowerCase();
            var primary = 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/128/color/' + s + '.png';
            var fallback = 'https://assets.coincap.io/assets/icons/' + s + '@2x.png';
            return '<img src="' + primary + '" alt="' + symbol + '" width="' + size + '" height="' + size + '" style="border-radius:50%;background:#1a1a1a;" onerror="this.onerror=null;this.src=\'' + fallback + '\';this.onerror=function(){this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'}"><span style="display:none;width:' + size + 'px;height:' + size + 'px;background:var(--surface-secondary);border-radius:50%;align-items:center;justify-content:center;font-size:' + Math.round(size * 0.4) + 'px;font-weight:700;color:var(--text-primary);">' + symbol.charAt(0) + '</span>';
        };

        window.coinNames = {
            'BTC': 'Bitcoin', 'ETH': 'Ethereum', 'SOL': 'Solana', 'DOGE': 'Dogecoin', 'ADA': 'Cardano',
            'XRP': 'Ripple', 'DOT': 'Polkadot', 'MATIC': 'Polygon', 'AVAX': 'Avalanche', 'LINK': 'Chainlink',
            'UNI': 'Uniswap', 'ATOM': 'Cosmos', 'LTC': 'Litecoin', 'BCH': 'Bitcoin Cash', 'NEAR': 'NEAR',
            'APT': 'Aptos', 'ARB': 'Arbitrum', 'OP': 'Optimism', 'FIL': 'Filecoin', 'ICP': 'Internet Computer',
            'SHIB': 'Shiba Inu', 'TRX': 'TRON', 'ETC': 'Ethereum Classic', 'XLM': 'Stellar', 'HBAR': 'Hedera'
        };

        // Switch chart symbol via React chart API
        function initTradingViewWidget(symbol) {
            if (symbol) window.currentChartSymbol = symbol;
            // Extract ticker from "BINANCE:BTCUSDT" → "BTCUSDT"
            const ticker = (symbol || window.currentChartSymbol).replace(/^[^:]+:/, '');
            window.yamatoChart?.setSymbol(ticker);
        }

        // Fullscreen functionality
        document.addEventListener('DOMContentLoaded', function() {
            const chartPanel = document.getElementById('chartPanel');
            const btnFullscreen = document.getElementById('btnFullscreen');
            const btnCloseFullscreen = document.getElementById('btnCloseFullscreen');

            btnFullscreen.addEventListener('click', function() {
                chartPanel.classList.add('fullscreen');
                btnFullscreen.style.display = 'none';
                btnCloseFullscreen.style.display = 'flex';
                document.body.style.overflow = 'hidden';

            btnCloseFullscreen.addEventListener('click', function() {
                chartPanel.classList.remove('fullscreen');
                btnFullscreen.style.display = 'flex';
                btnCloseFullscreen.style.display = 'none';
                document.body.style.overflow = '';
            });

            // ESC key to exit fullscreen
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && chartPanel.classList.contains('fullscreen')) {
                    btnCloseFullscreen.click();
                }
            });

            // Initialize widget
            initTradingViewWidget();
        });
    </script>

    <script>
        // ================================
        // LOAD MARKETS (seamless updates)
        // ================================
        let marketsInitialized = false;
        let currentFilter = 'all';
        let currentSearchQuery = '';

        async function loadMarkets() {
            try {
                const response = await fetch('/api/market/prices');
                const data = await response.json();
                window.allMarkets = data.prices || [];
                // Sync activeQuoteMarkets only when USDT is active
                if (window.quoteCurrency === 'USDT') window.activeQuoteMarkets = window.allMarkets;

                // Seamless update - only update prices, don't rebuild DOM
                if (marketsInitialized) {
                    if (window.quoteCurrency === 'USDT') updateMarketPrices(window.allMarkets);
                } else {
                    renderMarkets(getFilteredMarkets());
                    marketsInitialized = true;
                }

                // Update current price if selected coin is in the list
                const current = window.allMarkets.find(m => m.symbol === window.currentTicker);
                if (current) {
                    window.currentPrice = current.price;
                    // Only update price input if not in limit mode
                    if (window.orderType === 'market') {
                        updateOrderTotal();
                    }
                }
            } catch (error) {
                console.error('Failed to load markets:', error);
                if (!marketsInitialized) {
                    document.getElementById('marketList').innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-tertiary);">Помилка завантаження ринків</div>';
                }
            }
        }

        function getFilteredMarkets() {
            let filtered = [...(window.activeQuoteMarkets || window.allMarkets)];

            // Apply search filter
            if (currentSearchQuery) {
                filtered = filtered.filter(m =>
                    m.symbol.toLowerCase().includes(currentSearchQuery) ||
                    (window.coinNames[m.symbol] || '').toLowerCase().includes(currentSearchQuery)
                );
            }

            // Apply category filter
            if (currentFilter === 'gainers') {
                filtered = filtered.filter(m => m.change > 0).sort((a, b) => b.change - a.change);
            } else if (currentFilter === 'losers') {
                filtered = filtered.filter(m => m.change < 0).sort((a, b) => a.change - b.change);
            }

            return filtered;
        }

        function formatQuotePrice(price, quote) {
            if (!quote || quote === 'USDT') return '$' + formatPrice(price);
            // Crypto-quoted price: more decimals for small values
            var a = Math.abs(price);
            var dec = a < 0.000001 ? 8 : a < 0.0001 ? 7 : a < 0.001 ? 6 : a < 0.1 ? 5 : a < 1 ? 4 : 4;
            return price.toFixed(dec) + ' ' + quote;
        }

        // Seamless price update without rebuilding DOM
        function updateMarketPrices(markets) {
            const items = document.querySelectorAll('.market-item');
            items.forEach(item => {
                const symbol = item.dataset.symbol;
                const market = markets.find(m => m.symbol === symbol);
                if (market) {
                    const priceEl = item.querySelector('.price-val');
                    const changeEl = item.querySelector('.price-change');

                    if (priceEl) {
                        const newPrice = formatQuotePrice(market.price, window.quoteCurrency);
                        if (priceEl.textContent !== newPrice) {
                            priceEl.textContent = newPrice;
                            priceEl.style.color = market.change >= 0 ? '#10B981' : '#EF4444';
                            setTimeout(() => priceEl.style.color = '', 300);
                        }
                    }

                    if (changeEl) {
                        const changeSign = market.change >= 0 ? '+' : '';
                        changeEl.textContent = `${changeSign}${market.change.toFixed(2)}%`;
                        changeEl.className = `price-change ${market.change >= 0 ? '' : 'neg'}`;
                    }

                    item.dataset.price = market.price;
                }
            });
        }

        function renderMarkets(markets, limit = 10) {
            const container = document.getElementById('marketList');

            if (!markets || markets.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-tertiary);">Ринки не знайдено</div>';
                return;
            }

            const displayMarkets = markets.slice(0, limit);

            container.innerHTML = displayMarkets.map((market) => {
                const isActive = market.symbol === window.currentTicker;
                const changeClass = market.change >= 0 ? '' : 'neg';
                const changeSign = market.change >= 0 ? '+' : '';
                const name = window.coinNames[market.symbol] || market.symbol;

                return `
                    <div class="market-item ${isActive ? 'active' : ''}" data-symbol="${market.symbol}" data-price="${market.price}">
                        <div class="coin-info">
                            <div class="coin-icon">${window.getCoinLogoHtml(market.symbol, 32)}</div>
                            <div class="coin-name">
                                <span class="coin-ticker">${market.symbol}</span>
                                <span class="coin-sub">${name}</span>
                            </div>
                        </div>
                        <div class="coin-price">
                            <span class="price-val">${formatQuotePrice(market.price, window.quoteCurrency)}</span>
                            <span class="price-change ${changeClass}">${changeSign}${market.change.toFixed(2)}%</span>
                        </div>
                    </div>
                `;
            }).join('');

            // Add show more button if needed
            if (markets.length > limit) {
                container.innerHTML += `
                    <div id="showMoreBtn" style="padding: 12px; text-align: center; cursor: pointer; color: var(--accent-primary); font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05);">
                        Показати всі (${markets.length - limit} more)
                    </div>
                `;
                document.getElementById('showMoreBtn').addEventListener('click', () => renderMarkets(markets, markets.length));
            }

            // Add click handlers
            container.querySelectorAll('.market-item').forEach(item => {
                item.addEventListener('click', () => selectMarket(item));
            });
        }

        function formatPrice(price) {
            if (price >= 1000) return price.toLocaleString('en-US', { maximumFractionDigits: 2 });
            if (price >= 1) return price.toFixed(2);
            if (price >= 0.01) return price.toFixed(4);
            return price.toFixed(6);
        }

        function selectMarket(item) {
            document.querySelectorAll('.market-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');

            window.currentTicker = item.dataset.symbol;

            // For order calculations always use USDT price
            const usdtData = window.allMarkets.find(m => m.symbol === window.currentTicker);
            window.currentPrice = usdtData ? usdtData.price : parseFloat(item.dataset.price) * window.quoteCurrencyPrice;

            // Update UI
            const chartQuote = window.quoteCurrency || 'USDT';
            document.getElementById('currentSymbol').textContent = window.currentTicker + '/' + chartQuote;
            document.getElementById('amountSuffix').textContent = window.currentTicker;
            document.getElementById('orderBtnText').textContent = `${window.orderSide === 'buy' ? 'Купити' : 'Продати'} ${window.currentTicker}`;
            document.getElementById('orderPrice').value = window.currentPrice.toFixed(2);

            // Update 24h stats from USDT market data
            if (usdtData) {
                document.getElementById('stat24hHigh').textContent = `$${formatPrice(usdtData.high || usdtData.price * 1.02)}`;
                document.getElementById('stat24hVol').textContent = formatVolume(usdtData.volume || 0);
            }

            // Update chart with new symbol (respect quote currency)
            const newSymbol = `BINANCE:${window.currentTicker}${chartQuote}`;
            initTradingViewWidget(newSymbol);

            updateOrderTotal();
            loadOrderBook(window.currentTicker);
        }

        function formatVolume(volume) {
            if (volume >= 1e9) return `$${(volume / 1e9).toFixed(2)}B`;
            if (volume >= 1e6) return `$${(volume / 1e6).toFixed(2)}M`;
            if (volume >= 1e3) return `$${(volume / 1e3).toFixed(2)}K`;
            return `$${volume.toFixed(2)}`;
        }

        // ================================
        // SEARCH & FILTER  (supports BASE/QUOTE syntax)
        // ================================
        var KNOWN_QUOTES = ['USDT','BTC','ETH','BNB','SOL','USDC'];

        function _parseMarketSearch(raw) {
            // "/BTC" → { base:'', quote:'BTC' }
            // "SOL/BTC" → { base:'sol', quote:'BTC' }
            // "BTC" → { base:'btc', quote:null }
            var s = raw.trim();
            var slash = s.indexOf('/');
            if (slash !== -1) {
                var qPart = s.slice(slash + 1).trim().toUpperCase();
                var bPart = s.slice(0, slash).trim().toLowerCase();
                if (KNOWN_QUOTES.includes(qPart)) return { base: bPart, quote: qPart };
            }
            return { base: s.toLowerCase(), quote: null };
        }

        document.getElementById('marketSearch').addEventListener('input', async function(e) {
            var raw = e.target.value;
            var badge = document.getElementById('searchQuoteBadge');

            if (!raw.trim()) {
                // Clear → reset to USDT
                currentSearchQuery = '';
                if (window.quoteCurrency !== 'USDT') {
                    window.quoteCurrency = 'USDT';
                    window.quoteCurrencyPrice = 1;
                    window.activeQuoteMarkets = window.allMarkets;
                    var sym = window.currentTicker + 'USDT';
                    window.currentChartSymbol = 'BINANCE:' + sym;
                    window.yamatoChart?.setSymbol(sym);

                    await _ensureQuoteMarkets(parsed.quote);
                }
                // Update chart to current ticker in new quote
                if (window.currentTicker !== parsed.quote) {
                    var csym = window.currentTicker + parsed.quote;
                    window.currentChartSymbol = 'BINANCE:' + csym;
                    window.yamatoChart?.setSymbol(csym);
                    document.getElementById('currentSymbol').textContent = window.currentTicker + '/' + parsed.quote;

            // Show badge with active quote

                badge.style.display = '';
            } else {
                badge.style.display = 'none';

            marketsInitialized = false;
            renderMarkets(getFilteredMarkets());
            marketsInitialized = true;

        document.querySelectorAll('.filter-btn').forEach(btn => {

        // ================================

        function updateOrderTotal() {
            const amount = parseFloat(document.getElementById('orderAmount').value) || 0;
            const price = window.orderType === 'market' ? window.currentPrice : (parseFloat(document.getElementById('orderPrice').value) || 0);

        // ================================
        // EXECUTE ORDER
        // ================================
        document.getElementById('executeOrderBtn').addEventListener('click', async function() {
            const amount = parseFloat(document.getElementById('orderAmount').value);
            const price = window.orderType === 'market' ? null : parseFloat(document.getElementById('orderPrice').value);

            if (!amount || amount <= 0) {
                _inlineToast('Введіть коректну кількість', 'error');
                return;
            }

            if (window.orderType === 'limit' && (!price || price <= 0)) {
                _inlineToast('Введіть коректну ціну', 'error');
                return;
            }

            this.disabled = true;
            this.innerHTML = '<span style="display: flex; align-items: center; gap: 8px;"><div class="loader" style="width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite;"></div> Обробка...</span>';

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        symbol: window.currentTicker,
                        side: window.orderSide,
                        type: window.orderType,
                        price: price,
                        amount: amount
                    })
                });

                const data = await response.json();

                if (data.success) {
                    _inlineToast(`Ордер виконано! ${window.orderSide.toUpperCase()} ${amount} ${window.currentTicker} at $${data.order.price.toFixed(2)}`, 'success');

                    // Mark trade on chart
                    window.yamatoChart?.addTradeMarker(
                        window.orderSide,

                        `${window.orderSide === 'buy' ? 'Buy' : 'Sell'} ${amount} ${window.currentTicker}`

                    const formattedBalance = `$${data.newBalance.toFixed(2)}`;

                    document.getElementById('walletBalance').textContent = formattedBalance;

                    // Reset form
                    document.getElementById('orderAmount').value = '';

                } else {
                    _inlineToast(data.error || 'Order failed', 'error');

            } catch (error) {

                _inlineToast('Помилка виконання ордеру', 'error');

            this.disabled = false;
            this.innerHTML = `<span id="orderBtnText">${window.orderSide === 'buy' ? 'Купити' : 'Продати'} ${window.currentTicker}</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;
        });

        // ================================
        // ORDER BOOK
        // ================================
        let orderBookRetries = 0;
        const MAX_RETRIES = 3;

        async function loadOrderBook(symbol) {
            try {
                // Remove USDT suffix if present, server adds it
                const cleanSymbol = symbol.replace('USDT', '').toUpperCase();

                // Validate symbol exists in our list
                const validSymbols = ['BTC', 'ETH', 'SOL', 'DOGE', 'ADA', 'XRP', 'DOT', 'MATIC', 'AVAX', 'LINK',
                                      'UNI', 'ATOM', 'LTC', 'BCH', 'NEAR', 'APT', 'ARB', 'OP', 'FIL', 'ICP',
                                      'SHIB', 'TRX', 'ETC', 'XLM', 'HBAR'];
                if (!validSymbols.includes(cleanSymbol)) {
                    console.warn('Invalid symbol for orderbook:', cleanSymbol);
                    return;
                }

                const response = await fetch(`/api/market/orderbook/${cleanSymbol}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                updateOrderBookUI(data);
                orderBookRetries = 0; // Reset on success
            } catch (error) {
                console.warn('Order book load failed for', symbol, ':', error.message);

                // Retry logic with exponential backoff
                if (orderBookRetries < MAX_RETRIES) {
                    orderBookRetries++;
                    setTimeout(() => loadOrderBook(symbol), 1000 * orderBookRetries);
                } else {
                    // Show empty orderbook after max retries
                    updateOrderBookUI({ bids: [], asks: [] });
                    orderBookRetries = 0;
                }
            }
        }

        function calcOrderBookRows() {
            const container = document.querySelector('[data-panel-id="orderBook"]');
            if (!container) return 10;
            const h = container.clientHeight;
            const headerHeight = 30, dividerHeight = 9, padding = 24;
            const rowHeight = 24;
            const perSide = Math.floor((h - headerHeight - dividerHeight - padding) / rowHeight / 2);
            return Math.max(3, Math.min(20, perSide));
        }

        function updateOrderBookUI(data) {
            const container = document.querySelector('.order-book-list');
            if (!container) return;

            const rowCount = calcOrderBookRows();
            const asks = (data.asks || []).slice(0, rowCount).reverse();
            const bids = (data.bids || []).slice(0, rowCount);

            // Handle both array format [price, amount] and object format {price, amount}
            const getPrice = (item) => Array.isArray(item) ? item[0] : (item.price || 0);
            const getAmount = (item) => Array.isArray(item) ? item[1] : (item.amount || 0);

            const qPrice = window.quoteCurrencyPrice || 1;
            const isCross = window.quoteCurrency && window.quoteCurrency !== 'USDT';

            // Handle empty data
            if (asks.length === 0 && bids.length === 0) {
                container.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: var(--text-tertiary); font-size: 12px;">
                        <div style="margin-bottom: 8px;"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
                        Завантаження книги ордерів...
                    </div>
                `;
                return;
            }

            const fmtOBPrice = (p) => {
                const v = parseFloat(p) / qPrice;
                if (isCross) return v >= 1 ? v.toFixed(4) : v.toFixed(6);
                return v >= 1 ? v.toFixed(2) : v.toFixed(6);
            };

            let html = asks.map(item => `
                <div class="ob-row sell">
                    <span class="ob-price">${fmtOBPrice(getPrice(item))}</span>
                    <span class="ob-amount">${parseFloat(getAmount(item)).toFixed(4)}</span>
                </div>
            `).join('');

            html += '<div style="height: 1px; background: rgba(255,255,255,0.05); margin: 4px 0;"></div>';

            html += bids.map(item => `
                <div class="ob-row buy">
                    <span class="ob-price">${fmtOBPrice(getPrice(item))}</span>
                    <span class="ob-amount">${parseFloat(getAmount(item)).toFixed(4)}</span>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // ResizeObserver for adaptive order book rows
        (function() {
            let obResizeTimer = null;
            const obCard = document.querySelector('[data-panel-id="orderBook"]');
            if (obCard && typeof ResizeObserver !== 'undefined') {
                new ResizeObserver(() => {
                    clearTimeout(obResizeTimer);
                    obResizeTimer = setTimeout(() => {
                        loadOrderBook(window.currentTicker);
                    }, 200);
                }).observe(obCard);
            }
        })();

        function renderModalMarkets(markets, container) {
            container.innerHTML = markets.map(market => {
                const changeClass = market.change >= 0 ? 'color: #10B981' : 'color: #EF4444';
                const changeSign = market.change >= 0 ? '+' : '';

                return `

                        style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface-tertiary); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: background 0.2s;"

                            <div>

                            <div style="font-size: 12px; ${changeClass}">${changeSign}${market.change.toFixed(2)}%</div>
                        </div>
                    </div>
                `;
            }).join('');

            container.querySelectorAll('.modal-market-item').forEach(item => {
                item.addEventListener('click', function() {
                    const symbol = this.dataset.symbol;
                    const price = parseFloat(this.dataset.price);

                    window.currentTicker = symbol;
                    window.currentPrice = price;

                    document.getElementById('currentSymbol').textContent = symbol + '/USDT';
                    document.getElementById('amountSuffix').textContent = symbol;
                    document.getElementById('orderBtnText').textContent = `${window.orderSide === 'buy' ? 'Купити' : 'Продати'} ${symbol}`;
                    document.getElementById('orderPrice').value = price.toFixed(2);

                    // Update 24h stats from market data
                    const marketData = window.allMarkets.find(m => m.symbol === symbol);
                    if (marketData) {
                        document.getElementById('stat24hHigh').textContent = `$${formatPrice(marketData.high || price * 1.02)}`;
                        document.getElementById('stat24hVol').textContent = formatVolume(marketData.volume || 0);
                    }

                    // Update chart with new symbol (respect quote currency)
                    const q = window.quoteCurrency || 'USDT';
                    window.yamatoChart?.setSymbol(symbol + q);
                    document.getElementById('currentSymbol').textContent = symbol + '/' + q;

                    updateOrderTotal();
                    loadOrderBook(symbol);

                    // Update active state in list
                    marketsInitialized = false;
                    renderMarkets(getFilteredMarkets());
                    marketsInitialized = true;

                    document.getElementById('marketsModal').remove();
                });
            });
        }

        // ================================
        // QUOTE CURRENCY (data helpers)
        // ================================

        var _quotePairsCache = {};
        var _quotePairsCacheTtl = {};
        var QUOTE_STABLES = new Set(['USDT','USDC','BUSD','FDUSD','TUSD','DAI','USDP','EUR','GBP','AUD','TRY','BRL','BIDR']);

        // Fetch + cache quote markets without rendering
        async function _ensureQuoteMarkets(quote) {
            if (quote === 'USDT') { window.activeQuoteMarkets = window.allMarkets; return; }
            const now = Date.now();
            if (_quotePairsCache[quote] && (now - (_quotePairsCacheTtl[quote] || 0)) < 30000) {
                window.activeQuoteMarkets = _quotePairsCache[quote]; return;
            }
            try {
                const resp = await fetch('https://api.binance.com/api/v3/ticker/24hr?type=MINI');
                const all = await resp.json();
                const qLen = quote.length;
                const pairs = all
                    .filter(t => {
                        if (!t.s.endsWith(quote)) return false;
                        const base = t.s.slice(0, t.s.length - qLen);
                        return base !== quote && !QUOTE_STABLES.has(base);
                    })
                    .map(t => {
                        const lastPrice = parseFloat(t.lastPrice);
                        const openPrice = parseFloat(t.openPrice);
                        return {
                            symbol:   t.s.slice(0, t.s.length - qLen),
                            basePair: t.s,
                            price:    lastPrice,
                            change:   openPrice > 0 ? ((lastPrice - openPrice) / openPrice) * 100 : 0,
                            volume:   parseFloat(t.quoteVolume) || 0,
                            high:     parseFloat(t.highPrice) || lastPrice,
                        };
                    })
                    .filter(p => p.price > 0)
                    .sort((a, b) => b.volume - a.volume)
                    .slice(0, 300);
                _quotePairsCache[quote] = pairs;
                _quotePairsCacheTtl[quote] = now;
                window.activeQuoteMarkets = pairs;
            } catch(e) { window.activeQuoteMarkets = []; }
        }

        function updateLivePriceDisplay() {
            const priceEl = document.getElementById('livePrice');
            if (!priceEl) return;
            if (window.quoteCurrency === 'USDT') {
                priceEl.textContent = '$' + formatPrice(window.currentPrice);
            } else {
                const converted = window.currentPrice / window.quoteCurrencyPrice;
                priceEl.textContent = formatPrice(converted) + ' ' + window.quoteCurrency;
            }
        }

        // ================================
        // INIT
        // ================================
        document.addEventListener('DOMContentLoaded', function() {
            loadMarkets();
            loadAccountData();
            loadOrderBook('BTC');

            // Auto-refresh markets every 10 seconds (seamless updates)
            setInterval(loadMarkets, 10000);
            setInterval(() => loadOrderBook(window.currentTicker), 5000);
        });
    </script>

    <script>
    // ── Chart loading overlay + init symbol — must run BEFORE chart.js ─────────
    (function() {
        function drawOverlaySkeleton() {
            const canvas = document.getElementById('chartLoadingCanvas');
            if (!canvas) return;
            canvas.width  = canvas.offsetWidth  || canvas.parentElement.offsetWidth;
            canvas.height = canvas.offsetHeight || canvas.parentElement.offsetHeight;
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            if (!W || !H) return;
            ctx.clearRect(0, 0, W, H);

            const BAR_COUNT = Math.floor(W / 14);
            const SLOT_W    = W / BAR_COUNT;
            const BODY_W    = Math.max(3, SLOT_W * 0.45);
            const MID_Y     = H * 0.52;
            const RANGE     = H * 0.38;

            function r(seed) { const x = Math.sin(seed + 1.7) * 43758.5453; return x - Math.floor(x); }

            for (let i = 0; i < BAR_COUNT; i++) {
                const x     = i * SLOT_W + SLOT_W / 2;
                const r1    = r(i * 3), r2 = r(i * 3 + 1), r3 = r(i * 3 + 2);
                const bodyH = RANGE * 0.1 + r1 * RANGE * 0.55;
                const bodyY = MID_Y - bodyH / 2 + (r2 - 0.5) * RANGE * 0.35;
                const wickH = bodyH + RANGE * (0.05 + r3 * 0.18);
                const wickY = bodyY - (wickH - bodyH) / 2;
                const alpha = 0.055 + r1 * 0.045;
                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
                ctx.fillRect(x - 0.5, wickY, 1, wickH);
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(x - BODY_W / 2, bodyY, BODY_W, bodyH, 2);
                else ctx.rect(x - BODY_W / 2, bodyY, BODY_W, bodyH);
                ctx.fill();
            }
        }

        window.chartLoadingShow = function(show) {
            const el = document.getElementById('chartLoading');
            if (!el) return;
            if (show) {
                drawOverlaySkeleton();
                el.style.display = 'flex';
                requestAnimationFrame(() => el.classList.remove('is-hidden'));
            } else {
                el.classList.add('is-hidden');
                el.addEventListener('transitionend', function handler() {
                    el.removeEventListener('transitionend', handler);
                    if (el.classList.contains('is-hidden')) el.style.display = 'none';
                });
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            requestAnimationFrame(drawOverlaySkeleton);
        });

        // Set init symbol before chart.js IIFE reads it
        window._yamatoInitSymbol = (window.currentTicker || 'BTC') + (window.quoteCurrency || 'USDT');
    })();
    </script>

<script>
(function(){
    var m=window.matchMedia('(max-width:768px)');
    function t(e){
        var n=document.getElementById('mobileNav');
        var tp=document.getElementById('tradePanelToggle');
        if(n)n.style.display=e.matches?'flex':'none';
        if(tp)tp.style.display=e.matches?'flex':'none';
    }
    m.addEventListener('change',t);t(m);
    var tog=document.getElementById('tradePanelToggle');
    if(tog){
        tog.addEventListener('click',function(){
            tog.closest('.trade-panel').classList.toggle('open');
        });
    }

    // Swipe-to-close gesture for trade panel drawer
    var panel=document.querySelector('.trade-panel');
    if(panel){
        var startY=0,startOpen=false,dragging=false;
        panel.addEventListener('touchstart',function(e){
            startY=e.touches[0].clientY;
            startOpen=panel.classList.contains('open');
            dragging=true;
        },{passive:true});
        panel.addEventListener('touchmove',function(e){
            if(!dragging)return;
            var dy=e.touches[0].clientY-startY;
            // only handle downward swipe to close
            if(startOpen&&dy>0){
                panel.style.transform='translateY('+Math.min(dy,panel.offsetHeight)+'px)';
                panel.style.transition='none';
            }
        },{passive:true});
        panel.addEventListener('touchend',function(e){
            if(!dragging)return;
            dragging=false;
            var dy=e.changedTouches[0].clientY-startY;
            panel.style.transition='';
            panel.style.transform='';
            // close if swiped down more than 80px
            if(startOpen&&dy>80){
                panel.classList.remove('open');
            }
        },{passive:true});
    }
})();
</script>
