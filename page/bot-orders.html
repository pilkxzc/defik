<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamato — Ордери</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=robot" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/shared-layout.css">
    <link rel="stylesheet" href="/css/nav-fix.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/scrollbar.css">
    <style>
        .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-size:24px;line-height:1;color:inherit;display:inline-flex;align-items:center;justify-content:center;}

        .app-container {
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: 56px 1fr;
            height: 100vh;
        }
        .header-bar {
            grid-column: 2; grid-row: 1;
            display: flex; align-items: center; gap: 12px;
            padding: 0 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .main-content {
            grid-column: 2; grid-row: 2;
            overflow-y: auto; padding: 24px;
            scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        /* Header */
        .back-btn {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255,255,255,0.06); color: var(--text-secondary);
            text-decoration: none; transition: 0.15s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .page-title { font-size: 18px; font-weight: 700; }
        .admin-badge {
            font-size: 9px; font-weight: 800; letter-spacing: 1px;
            background: rgba(139,92,246,0.15); color: #C4B5FD; border: 1px solid rgba(139,92,246,0.3);
            padding: 3px 8px; border-radius: 6px;
        }
        .symbol-badge {
            font-size: 12px; font-weight: 700; color: var(--accent-primary);
            background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);
            padding: 4px 10px; border-radius: 8px; font-family: 'JetBrains Mono', monospace;
        }
        .header-spacer { flex: 1; }
        .header-count { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .search-box {
            flex: 1; min-width: 200px; max-width: 360px;
            display: flex; align-items: center; gap: 8px;
            background: var(--surface-secondary); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; padding: 0 12px; height: 36px;
            transition: border-color 0.15s;
        }
        .search-box:focus-within { border-color: rgba(139,92,246,0.4); }
        .search-box svg { flex-shrink: 0; color: var(--text-tertiary); }
        .search-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-primary); font-size: 13px; font-family: inherit;
        }
        .search-box input::placeholder { color: var(--text-tertiary); }

        .filter-group { display: flex; gap: 4px; }
        .filter-btn {
            padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03); color: var(--text-secondary);
            font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.15s;
            font-family: inherit; white-space: nowrap;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.06); }
        .filter-btn.active {
            background: rgba(139,92,246,0.15); color: #C4B5FD;
            border-color: rgba(139,92,246,0.3);
        }

        .time-select {
            background: var(--surface-secondary); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px; padding: 6px 10px; color: var(--text-secondary);
            font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
            outline: none; appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23636363' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
            background-repeat: no-repeat; background-position: right 8px center;
            padding-right: 24px;
        }

        /* Stats summary row */
        .stats-row {
            display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .stat-card {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 12px 16px; flex: 1; min-width: 120px;
        }
        .stat-label { font-size: 10px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* Table */
        .orders-card {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; overflow: hidden;
        }
        .orders-table-wrap {
            overflow-x: auto; scrollbar-width: none;
        }
        .orders-table-wrap::-webkit-scrollbar { display: none; }
        .orders-tbl {
            width: 100%; border-collapse: collapse; font-size: 12px;
        }
        .orders-tbl th {
            text-align: left; padding: 12px 14px; font-size: 10px; font-weight: 700;
            color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;
            background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky; top: 0; z-index: 1;
        }
        .orders-tbl th.sortable {
            cursor: pointer; user-select: none; white-space: nowrap;
        }
        .orders-tbl th.sortable::after {
            content: '\21C5'; margin-left: 4px; opacity: 0.3; font-size: 9px;
        }
        .orders-tbl th.sortable.active-sort { color: #C4B5FD; }
        .orders-tbl th.sortable.active-sort.asc::after { content: '\2191'; opacity: 0.8; }
        .orders-tbl th.sortable.active-sort.desc::after { content: '\2193'; opacity: 0.8; }
        .orders-tbl td {
            padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-secondary); vertical-align: middle;
        }
        .orders-tbl tr:hover td { background: rgba(255,255,255,0.02); }
        .orders-tbl .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }

        /* Badges */
        .badge-long { color: #22D3EE; background: rgba(34,211,238,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-short { color: #F59E0B; background: rgba(245,158,11,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-filled { color: #10B981; background: rgba(16,185,129,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-canceled { color: #EF4444; background: rgba(239,68,68,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-new { color: #8CA8FF; background: rgba(140,168,255,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-expired { color: #636363; background: rgba(99,99,99,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-type { color: #C4B5FD; background: rgba(139,92,246,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-tertiary);
            font-size: 14px; font-weight: 500;
        }
        .empty-state svg { margin-bottom: 12px; opacity: 0.3; }

        /* Loading spinner */
        .loading-spinner {
            display: flex; align-items: center; justify-content: center; padding: 60px;
        }
        .loading-spinner::after {
            content: ''; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #C4B5FD; border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pagination */
        .pagination {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 12px; color: var(--text-tertiary);
        }
        .pagination-btns { display: flex; gap: 4px; }
        .page-btn {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03); color: var(--text-secondary);
            cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: 0.15s;
        }
        .page-btn:hover { background: rgba(255,255,255,0.06); }
        .page-btn.active { background: rgba(139,92,246,0.15); color: #C4B5FD; border-color: rgba(139,92,246,0.3); }
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        /* Order chart overlay */
        .chart-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 1000; backdrop-filter: blur(6px);
            flex-direction: column;
        }
        .chart-overlay.open { display: flex; }
        .chart-overlay-header {
            display: flex; align-items: center; gap: 12px; padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
        }
        .chart-overlay-close {
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.06); color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: 0.15s;
        }
        .chart-overlay-close:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }
        .chart-overlay-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .chart-tf-group { display: flex; gap: 3px; margin-left: 16px; }
        .chart-tf-btn {
            padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03); color: var(--text-secondary);
            font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'JetBrains Mono', monospace;
            transition: 0.15s;
        }
        .chart-tf-btn:hover { background: rgba(255,255,255,0.06); }
        .chart-tf-btn.active { background: rgba(139,92,246,0.2); color: #C4B5FD; border-color: rgba(139,92,246,0.3); }
        .chart-overlay-body {
            display: flex; flex: 1; min-height: 0; overflow: hidden;
        }
        .chart-canvas-wrap {
            flex: 1; position: relative; min-width: 0;
        }
        .chart-canvas-wrap canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
        }
        .chart-loading {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); z-index: 2;
        }
        .chart-loading::after {
            content: ''; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #C4B5FD; border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        .chart-info-panel {
            width: 260px; flex-shrink: 0; padding: 16px; overflow-y: auto;
            border-left: 1px solid rgba(255,255,255,0.08);
            scrollbar-width: none;
        }
        .chart-info-panel::-webkit-scrollbar { display: none; }
        .chart-info-panel h4 { font-size: 12px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .info-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
        .info-label { color: var(--text-tertiary); }
        .info-value { font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .chart-crosshair-info {
            position: absolute; top: 8px; left: 12px; z-index: 3;
            font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary);
            pointer-events: none; display: flex; gap: 12px;
        }

        /* Bot selector */
        .selector-bot-card {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; overflow: hidden;
        }
        .selector-bot-header {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .selector-bot-name { font-size: 14px; font-weight: 700; }
        .selector-coin-list { display: flex; flex-direction: column; }
        .selector-coin-link {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 18px; text-decoration: none; color: var(--text-secondary);
            font-size: 12px; font-weight: 600; transition: background 0.12s;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .selector-coin-link:last-child { border-bottom: none; }
        .selector-coin-link:hover { background: rgba(139,92,246,0.08); color: var(--text-primary); }
        .selector-coin-dot {
            width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0;
        }
        .selector-coin-dot.active {
            background: var(--color-up); box-shadow: 0 0 6px rgba(16,185,129,0.5);
        }
        .selector-coin-name { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; }

        @media (max-width: 768px) {
            .chart-overlay-body { flex-direction: column; }
            .chart-info-panel { width: auto; max-height: 200px; border-left: none; border-top: 1px solid rgba(255,255,255,0.08); }
            .chart-tf-group { flex-wrap: wrap; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .stats-row { gap: 8px; }
            .stat-card { min-width: 90px; padding: 10px 12px; }
            .stat-value { font-size: 14px; }
            .toolbar { gap: 8px; }
            .search-box { min-width: 150px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <nav class="nav-sidebar">
        <a href="/dashboard" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></a>
        <a href="/portfolio" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg></a>

        <a href="/community" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></a>
        <a href="/docs" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path><line x1="8" y1="7" x2="16" y2="7"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg></a>

    </nav>

    <!-- Header -->
    <header class="header-bar">
        <a class="back-btn" id="backBtn" href="/bots" title="Назад">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="page-title" id="pageTitle">Ордери</span>
        <span class="admin-badge">ADMIN</span>
        <span class="symbol-badge" id="symbolBadge">---</span>
        <div class="header-spacer"></div>
        <span class="header-count" id="headerCount"></span>
    </header>

    <!-- Main -->
    <div class="main-content">
        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="stat-label">Всього</div><div class="stat-value" id="statTotal">-</div></div>
            <div class="stat-card"><div class="stat-label">Виконано</div><div class="stat-value" id="statFilled" style="color:var(--color-up);">-</div></div>
            <div class="stat-card"><div class="stat-label">Скасовано</div><div class="stat-value" id="statCanceled" style="color:var(--color-down);">-</div></div>
            <div class="stat-card"><div class="stat-label">Нові</div><div class="stat-value" id="statNew" style="color:#8CA8FF;">-</div></div>
            <div class="stat-card"><div class="stat-label">Протерміновано</div><div class="stat-value" id="statExpired">-</div></div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="searchInput" placeholder="Пошук по ID, типу, статусу...">
            </div>
            <div class="filter-group" id="sideFilters">
                <button class="filter-btn active" data-side="all">Все</button>
                <button class="filter-btn" data-side="BUY">Long</button>
                <button class="filter-btn" data-side="SELL">Short</button>
            </div>
            <div class="filter-group" id="statusFilters">
                <button class="filter-btn active" data-status="all">Все</button>
                <button class="filter-btn" data-status="FILLED">Filled</button>
                <button class="filter-btn" data-status="CANCELED">Canceled</button>
                <button class="filter-btn" data-status="NEW">New</button>
                <button class="filter-btn" data-status="EXPIRED">Expired</button>
            </div>
            <div class="filter-group" id="typeFilters">
                <button class="filter-btn active" data-type="all">Все</button>
                <button class="filter-btn" data-type="LIMIT">Limit</button>
                <button class="filter-btn" data-type="MARKET">Market</button>
                <button class="filter-btn" data-type="STOP">Stop</button>
                <button class="filter-btn" data-type="TP">TP</button>
            </div>
            <select class="time-select" id="timeFilter">
                <option value="0">Весь час</option>
                <option value="1">24 години</option>
                <option value="7">7 днів</option>
                <option value="30">30 днів</option>
                <option value="90">90 днів</option>
            </select>
        </div>

        <!-- Table -->
        <div class="orders-card">
            <div class="orders-table-wrap">
                <table class="orders-tbl">
                    <thead>
                        <tr>
                            <th style="width:32px;"></th>
                            <th class="sortable active-sort desc" data-sort="time">Дата</th>
                            <th class="sortable" data-sort="orderId">Order ID</th>
                            <th class="sortable" data-sort="symbol">Символ</th>
                            <th class="sortable" data-sort="side">Сторона</th>
                            <th class="sortable" data-sort="type">Тип</th>
                            <th class="sortable" data-sort="price">Ціна</th>
                            <th class="sortable" data-sort="quantity">К-сть</th>
                            <th class="sortable" data-sort="executedQty">Виконано</th>
                            <th class="sortable" data-sort="status">Статус</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody">
                        <tr><td colspan="10"><div class="loading-spinner"></div></td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
</div>

<!-- Order Chart Overlay -->
<div class="chart-overlay" id="chartOverlay">
    <div class="chart-overlay-header">
        <button class="chart-overlay-close" id="chartClose">&times;</button>
        <div class="chart-overlay-title" id="chartTitle"></div>
        <div class="chart-tf-group" id="chartTfGroup">
            <button class="chart-tf-btn" data-tf="1m">1m</button>
            <button class="chart-tf-btn" data-tf="5m">5m</button>
            <button class="chart-tf-btn active" data-tf="15m">15m</button>
            <button class="chart-tf-btn" data-tf="1h">1h</button>
            <button class="chart-tf-btn" data-tf="4h">4h</button>
            <button class="chart-tf-btn" data-tf="1d">1d</button>
        </div>
        <div style="flex:1;"></div>
        <span id="chartOHLC" style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-tertiary);"></span>
    </div>
    <div class="chart-overlay-body">
        <div class="chart-canvas-wrap" id="chartWrap">
            <canvas id="chartCanvas"></canvas>
            <div class="chart-loading" id="chartLoading" style="display:none;"></div>
            <div class="chart-crosshair-info" id="chartCrosshair"></div>
        </div>
        <div class="chart-info-panel" id="chartInfoPanel"></div>
    </div>
</div>

<!-- Mobile nav -->
<nav class="mobile-nav" id="mobileNav" style="display:none;">
    <a href="/dashboard" class="mobile-nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span>Дашборд</span></a>
    <a href="/portfolio" class="mobile-nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg><span>Портфоліо</span></a>
    <a href="/bots" class="mobile-nav-item"><span class="material-symbols-outlined" style="font-size:22px;">robot</span><span>Боти</span></a>
    <a href="/profile" class="mobile-nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Профіль</span></a>
</nav>

<script src="/js/app.js"></script>
<script>
(function() {
    // Mobile nav
    const mq = window.matchMedia('(max-width: 768px)');
    function toggleMobileNav(e) { const n = document.getElementById('mobileNav'); if (n) n.style.display = e.matches ? 'flex' : 'none'; }
    mq.addEventListener('change', toggleMobileNav); toggleMobileNav(mq);

    // Parse URL
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const lastPart = pathParts[pathParts.length - 1];
    const botId = lastPart && lastPart !== 'bot-orders' && /^\d+$/.test(lastPart) ? lastPart : null;
    const urlParams = new URLSearchParams(window.location.search);
    const symbol = urlParams.get('symbol') || 'BTCUSDT';
    const isSelectorMode = !botId;

    // State
    let allOrders = [];
    let filteredOrders = [];
    let sortKey = 'time';
    let sortDir = 'desc';
    let sideFilter = 'all';
    let statusFilter = 'all';
    let typeFilter = 'all';
    let timeFilter = 0;
    let searchQuery = '';
    let currentPage = 1;
    const perPage = 50;

    // Check admin first
    fetch('/api/auth/me', { credentials: 'include' })
        .then(r => r.ok ? r.json() : null)
        .then(user => {
            if (!user || (user.role !== 'admin' && user.role !== 'moderator')) {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-tertiary);font-size:16px;">Доступ заборонено</div>';
                return;
            }
            if (user?.role === 'admin') {
                const adminLink = document.getElementById('adminNavLink');
                if (adminLink) adminLink.classList.remove('admin-hidden');
            }
            if (isSelectorMode) {
                showBotSelector();
            } else {
                initOrdersView();
            }
        }).catch(() => {});

    // ═══════════════════════════════════════════
    //  BOT SELECTOR MODE (no bot ID)
    // ═══════════════════════════════════════════
    async function showBotSelector() {
        document.getElementById('pageTitle').textContent = 'Ордери — Вибір бота';
        document.getElementById('symbolBadge').style.display = 'none';
        document.getElementById('headerCount').style.display = 'none';
        document.title = 'Yamato — Ордери';
        document.getElementById('backBtn').href = '/admin';

        // Hide orders UI, show selector
        document.querySelector('.main-content').innerHTML = `
            <div class="stats-row" style="margin-bottom:8px;">
                <div class="stat-card" style="flex:none;width:100%;">
                    <div class="stat-label">Виберіть бота та монету для перегляду ордерів</div>
                </div>
            </div>
            <div class="search-box" style="max-width:400px;margin-bottom:16px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="botSearchInput" placeholder="Пошук бота або монети...">
            </div>
            <div id="botSelectorList" style="display:flex;flex-direction:column;gap:8px;">
                <div class="loading-spinner"></div>
            </div>
        `;

        try {
            const res = await fetch('/api/bots/tree', { credentials: 'include' });
            if (!res.ok) throw new Error('Failed');
            const { tree } = await res.json();
            const allBots = tree ? tree.flatMap(c => c.bots || []) : [];

            renderBotSelector(allBots);

            // Search
            document.getElementById('botSearchInput')?.addEventListener('input', function() {
                const q = this.value.toLowerCase().trim();
                renderBotSelector(allBots, q);
            });
        } catch (e) {
            document.getElementById('botSelectorList').innerHTML =
                '<div class="empty-state">Помилка завантаження ботів</div>';
        }
    }

    function renderBotSelector(bots, query) {
        const container = document.getElementById('botSelectorList');
        if (!container) return;

        let filtered = bots;
        if (query) {
            filtered = bots.filter(b => {
                if (b.name.toLowerCase().includes(query)) return true;
                return (b.instruments || []).some(c => (c.symbol || '').toLowerCase().includes(query));
            });
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">Ботів не знайдено</div>';
            return;
        }

        container.innerHTML = filtered.map(b => {
            const coins = b.instruments || [];
            const statusColors = { live: '#10B981', idle: '#8CA8FF', stopped: '#636363', off: '#EF4444' };
            const statusLabels = { live: 'Live', idle: 'Idle', stopped: 'Stopped', off: 'Off' };
            const statusColor = statusColors[b.realStatus] || '#636363';
            const statusLabel = statusLabels[b.realStatus] || 'Off';
            const isLive = b.realStatus === 'live';
            const modeBadge = b.mode === 'test' || b.mode === 'paper'
                ? '<span style="font-size:9px;font-weight:800;background:rgba(245,158,11,0.15);color:#F59E0B;padding:2px 6px;border-radius:4px;margin-left:6px;">PAPER</span>'
                : '<span style="font-size:9px;font-weight:800;background:rgba(16,185,129,0.15);color:#10B981;padding:2px 6px;border-radius:4px;margin-left:6px;">LIVE</span>';

            const coinLinks = coins.length > 0 ? coins.map(c => {
                const sym = c.symbol || c;
                const displaySym = sym.replace(/USDT|BUSD/gi, '');
                const hasOpen = c.hasOpenTrade || false;
                const pnl = c.pnl || 0;
                const pnlColor = pnl > 0 ? 'var(--color-up)' : pnl < 0 ? 'var(--color-down)' : 'var(--text-tertiary)';
                const pnlStr = (pnl > 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2);
                return `<a href="/bot-orders/${b.id}?symbol=${sym}" class="selector-coin-link">
                    <span class="selector-coin-dot${hasOpen ? ' active' : ''}"></span>
                    <span class="selector-coin-name">${displaySym}</span>
                    <span style="font-size:10px;font-weight:700;color:${pnlColor};margin-left:auto;">${pnlStr}</span>
                    <span style="font-size:10px;color:${hasOpen ? 'var(--color-up)' : 'var(--text-tertiary)'};">${hasOpen ? 'Live' : 'Idle'}</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </a>`;
            }).join('') : '<div style="padding:8px 16px;font-size:11px;color:var(--text-tertiary);">Немає монет</div>';

            return `<div class="selector-bot-card">
                <div class="selector-bot-header">
                    <span style="width:8px;height:8px;border-radius:50%;background:${statusColor};flex-shrink:0;${isLive ? 'box-shadow:0 0 6px ' + statusColor + ';' : ''}"></span>
                    <span class="selector-bot-name">${b.name}</span>
                    ${modeBadge}
                    <span style="font-size:10px;color:${statusColor};font-weight:600;margin-left:auto;">${statusLabel}</span>
                    <span style="font-size:10px;color:var(--text-tertiary);">${coins.length} монет</span>
                </div>
                <div class="selector-coin-list">${coinLinks}</div>
            </div>`;
        }).join('');
    }

    // ═══════════════════════════════════════════
    //  ORDERS VIEW MODE (with bot ID)
    // ═══════════════════════════════════════════
    function initOrdersView() {
        document.getElementById('symbolBadge').textContent = symbol.replace(/USDT|BUSD/gi, '/USDT');
        document.title = `Yamato — Ордери ${symbol.replace(/USDT|BUSD/gi, '')}`;

        // Fetch bot name
        fetch(`/api/bots/${botId}/details`, { credentials: 'include' })
            .then(r => r.ok ? r.json() : null)
            .then(d => {
                if (d?.bot?.name) {
                    document.getElementById('pageTitle').textContent = d.bot.name + ' — Ордери';
                    document.getElementById('backBtn').href = '/bot-orders';
                }
            }).catch(() => {});

        loadOrders();
    }

    // Fetch orders
    async function loadOrders() {
        try {
            const res = await fetch(`/api/bots/${botId}/order-history?symbol=${symbol}`, { credentials: 'include' });
            if (!res.ok) throw new Error('Failed');
            const data = await res.json();
            allOrders = data.orders || [];
            applyFilters();
        } catch (e) {
            document.getElementById('ordersBody').innerHTML =
                '<tr><td colspan="10" class="empty-state">Помилка завантаження ордерів</td></tr>';
        }
    }

    function fmtPrice(v) {
        v = parseFloat(v) || 0;
        if (v === 0) return '0';
        if (v >= 1000) return v.toFixed(2);
        if (v >= 1) return v.toFixed(4);
        return v.toPrecision(4);
    }

    function applyFilters() {
        let orders = allOrders.slice();

        // Side filter
        if (sideFilter !== 'all') orders = orders.filter(o => o.side === sideFilter);

        // Status filter
        if (statusFilter !== 'all') orders = orders.filter(o => o.status === statusFilter);

        // Type filter
        if (typeFilter !== 'all') {
            if (typeFilter === 'STOP') {
                orders = orders.filter(o => o.type && (o.type.includes('STOP') && !o.type.includes('TAKE_PROFIT')));
            } else if (typeFilter === 'TP') {
                orders = orders.filter(o => o.type && o.type.includes('TAKE_PROFIT'));
            } else {
                orders = orders.filter(o => o.type === typeFilter);
            }
        }

        // Time filter
        if (timeFilter > 0) {
            const cutoff = Date.now() - timeFilter * 86400000;
            orders = orders.filter(o => (o.time || o.updateTime || 0) >= cutoff);
        }

        // Search
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            orders = orders.filter(o =>
                String(o.orderId).includes(q) ||
                (o.symbol || '').toLowerCase().includes(q) ||
                (o.side || '').toLowerCase().includes(q) ||
                (o.type || '').toLowerCase().replace(/_/g, ' ').includes(q) ||
                (o.status || '').toLowerCase().includes(q)
            );
        }

        // Sort
        const dir = sortDir === 'asc' ? 1 : -1;
        orders.sort((a, b) => {
            let va, vb;
            switch (sortKey) {
                case 'orderId':     va = a.orderId || 0; vb = b.orderId || 0; break;
                case 'symbol':      return dir * (a.symbol || '').localeCompare(b.symbol || '');
                case 'side':        return dir * (a.side || '').localeCompare(b.side || '');
                case 'type':        return dir * (a.type || '').localeCompare(b.type || '');
                case 'price':       va = a.avgPrice > 0 ? a.avgPrice : (a.stopPrice > 0 ? a.stopPrice : (a.price || 0)); vb = b.avgPrice > 0 ? b.avgPrice : (b.stopPrice > 0 ? b.stopPrice : (b.price || 0)); break;
                case 'quantity':    va = a.quantity || 0; vb = b.quantity || 0; break;
                case 'executedQty': va = a.executedQty || 0; vb = b.executedQty || 0; break;
                case 'status':      return dir * (a.status || '').localeCompare(b.status || '');
                default: /* time */ va = a.time || a.updateTime || 0; vb = b.time || b.updateTime || 0;
            }
            return dir * (va - vb);
        });

        filteredOrders = orders;
        updateStats();
        renderTable();
    }

    function updateStats() {
        const total = allOrders.length;
        const filled = allOrders.filter(o => o.status === 'FILLED').length;
        const canceled = allOrders.filter(o => o.status === 'CANCELED').length;
        const newO = allOrders.filter(o => o.status === 'NEW').length;
        const expired = allOrders.filter(o => o.status === 'EXPIRED').length;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statFilled').textContent = filled;
        document.getElementById('statCanceled').textContent = canceled;
        document.getElementById('statNew').textContent = newO;
        document.getElementById('statExpired').textContent = expired;
        document.getElementById('headerCount').textContent = filteredOrders.length + ' з ' + total;
    }

    function renderTable() {
        const body = document.getElementById('ordersBody');
        if (filteredOrders.length === 0) {
            body.innerHTML = `<tr><td colspan="10"><div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                <div>Ордерів не знайдено</div>
            </div></td></tr>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(filteredOrders.length / perPage);
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * perPage;
        const pageOrders = filteredOrders.slice(start, start + perPage);

        body.innerHTML = pageOrders.map((o, pi) => {
            const isBuy = o.side === 'BUY';
            const badgeSide = isBuy ? 'badge-long' : 'badge-short';
            const statusCls = o.status === 'FILLED' ? 'badge-filled'
                : o.status === 'CANCELED' ? 'badge-canceled'
                : o.status === 'NEW' ? 'badge-new'
                : o.status === 'EXPIRED' ? 'badge-expired'
                : 'badge-type';
            const displayPrice = o.avgPrice > 0 ? o.avgPrice : (o.stopPrice > 0 ? o.stopPrice : o.price);
            const execPct = o.quantity > 0 ? Math.round((o.executedQty || 0) / o.quantity * 100) : 0;
            const dt = o.time ? new Date(o.time) : (o.updateTime ? new Date(o.updateTime) : null);
            const dateStr = dt ? dt.toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'2-digit' }) + ' ' + dt.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) : '\u2014';
            const orderType = (o.type || '\u2014').replace(/_/g, ' ');
            return `<tr style="cursor:pointer;" onclick="showOrderByIdx(${start + pi})">
                <td style="padding:6px 4px 6px 10px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C4B5FD" stroke-width="2" style="opacity:0.5;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></td>
                <td style="color:var(--text-tertiary);font-size:11px;white-space:nowrap;">${dateStr}</td>
                <td class="mono" style="font-size:10px;" title="${o.orderId}">${o.orderId}</td>
                <td class="mono">${(o.symbol || '').replace('USDT', '')}</td>
                <td><span class="${badgeSide}">${o.side}</span></td>
                <td><span class="badge-type">${orderType}</span></td>
                <td class="mono">$${fmtPrice(displayPrice)}</td>
                <td class="mono">${parseFloat(o.quantity || 0).toFixed(4)}</td>
                <td class="mono">${execPct > 0 ? execPct + '%' : '\u2014'}</td>
                <td><span class="${statusCls}">${o.status}</span></td>
            </tr>`;
        }).join('');

        // Pagination
        const pagEl = document.getElementById('pagination');
        if (totalPages <= 1) {
            pagEl.innerHTML = `<span>${filteredOrders.length} ордерів</span><span></span>`;
            return;
        }
        let btns = '';
        btns += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">&laquo;</button>`;
        const maxBtns = 7;
        let startP = Math.max(1, currentPage - Math.floor(maxBtns / 2));
        let endP = Math.min(totalPages, startP + maxBtns - 1);
        if (endP - startP < maxBtns - 1) startP = Math.max(1, endP - maxBtns + 1);
        for (let i = startP; i <= endP; i++) {
            btns += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
        }
        btns += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">&raquo;</button>`;
        pagEl.innerHTML = `<span>${start + 1}\u2013${Math.min(start + perPage, filteredOrders.length)} з ${filteredOrders.length}</span><div class="pagination-btns">${btns}</div>`;
    }

    window.goPage = function(p) {
        currentPage = p;
        renderTable();
        document.querySelector('.orders-table-wrap')?.scrollTo(0, 0);
    };

    // ═══════════════════════════════════════════
    //  ORDER CHART OVERLAY
    // ═══════════════════════════════════════════
    let _chartOrder = null;
    let _chartTF = '15m';
    let _chartKlines = [];
    const _tfMs = { '1m': 60000, '5m': 300000, '15m': 900000, '1h': 3600000, '4h': 14400000, '1d': 86400000 };

    window.showOrderByIdx = function(idx) {
        if (filteredOrders[idx]) showOrderDetail(filteredOrders[idx]);
    };

    window.showOrderDetail = function(o) {
        _chartOrder = o;
        const overlay = document.getElementById('chartOverlay');
        overlay.classList.add('open');

        // Title
        const isBuy = o.side === 'BUY';
        const badgeSide = isBuy ? 'badge-long' : 'badge-short';
        const statusCls = o.status === 'FILLED' ? 'badge-filled' : o.status === 'CANCELED' ? 'badge-canceled' : o.status === 'NEW' ? 'badge-new' : o.status === 'EXPIRED' ? 'badge-expired' : 'badge-type';
        document.getElementById('chartTitle').innerHTML =
            `<span class="${badgeSide}">${o.side}</span>` +
            `<span class="badge-type">${(o.type || '').replace(/_/g, ' ')}</span>` +
            `<span class="${statusCls}">${o.status}</span>` +
            `<span style="color:var(--text-secondary);font-size:12px;">#${o.orderId}</span>`;

        // Info panel
        const fmtDt = d => d ? new Date(d).toLocaleDateString('uk-UA') + ' ' + new Date(d).toLocaleTimeString('uk-UA') : '\u2014';
        document.getElementById('chartInfoPanel').innerHTML = `
            <h4>Деталі ордеру</h4>
            <div class="info-row"><span class="info-label">Order ID</span><span class="info-value">${o.orderId}</span></div>
            <div class="info-row"><span class="info-label">Символ</span><span class="info-value">${o.symbol}</span></div>
            <div class="info-row"><span class="info-label">Сторона</span><span class="info-value"><span class="${badgeSide}">${o.side}</span></span></div>
            <div class="info-row"><span class="info-label">Тип</span><span class="info-value">${(o.type || '').replace(/_/g, ' ')}</span></div>
            <div class="info-row"><span class="info-label">Ціна</span><span class="info-value">$${fmtPrice(o.price)}</span></div>
            ${o.stopPrice > 0 ? `<div class="info-row"><span class="info-label">Stop ціна</span><span class="info-value">$${fmtPrice(o.stopPrice)}</span></div>` : ''}
            ${o.avgPrice > 0 ? `<div class="info-row"><span class="info-label">Сер. ціна</span><span class="info-value">$${fmtPrice(o.avgPrice)}</span></div>` : ''}
            <div class="info-row"><span class="info-label">К-сть</span><span class="info-value">${parseFloat(o.quantity || 0).toFixed(4)}</span></div>
            <div class="info-row"><span class="info-label">Виконано</span><span class="info-value">${parseFloat(o.executedQty || 0).toFixed(4)}</span></div>
            <div class="info-row"><span class="info-label">Статус</span><span class="info-value"><span class="${statusCls}">${o.status}</span></span></div>
            <div class="info-row"><span class="info-label">Створено</span><span class="info-value" style="font-size:10px;">${fmtDt(o.time)}</span></div>
            <div class="info-row"><span class="info-label">Оновлено</span><span class="info-value" style="font-size:10px;">${fmtDt(o.updateTime)}</span></div>
        `;

        // Set active TF button
        document.querySelectorAll('.chart-tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === _chartTF));

        loadChartKlines();
    };

    async function loadChartKlines() {
        if (!_chartOrder) return;
        const loader = document.getElementById('chartLoading');
        loader.style.display = 'flex';

        const o = _chartOrder;
        const orderTime = o.time || o.updateTime || Date.now();
        const intervalMs = _tfMs[_chartTF] || 900000;
        const sym = o.symbol || symbol;

        // 100 bars before + order bar + 100 bars after
        const startTime = orderTime - 100 * intervalMs;
        const endTime = orderTime + 100 * intervalMs;

        try {
            const url = `https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=${_chartTF}&startTime=${startTime}&endTime=${endTime}&limit=201`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Binance error');
            const raw = await res.json();
            _chartKlines = raw.map(k => ({
                time: k[0], open: parseFloat(k[1]), high: parseFloat(k[2]),
                low: parseFloat(k[3]), close: parseFloat(k[4]), volume: parseFloat(k[5])
            }));
        } catch (e) {
            console.error('Chart klines error:', e);
            _chartKlines = [];
        }

        loader.style.display = 'none';
        drawChart();
    }

    function drawChart() {
        const wrap = document.getElementById('chartWrap');
        const canvas = document.getElementById('chartCanvas');
        const dpr = window.devicePixelRatio || 1;
        const W = wrap.clientWidth;
        const H = wrap.clientHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        // Background
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, W, H);

        const klines = _chartKlines;
        if (klines.length === 0) {
            ctx.fillStyle = '#636363';
            ctx.font = '13px "Plus Jakarta Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Немає даних для цього таймфрейму', W / 2, H / 2);
            return;
        }

        // Layout
        const padTop = 20, padBottom = 28, padLeft = 8, padRight = 72;
        const chartW = W - padLeft - padRight;
        const chartH = H - padTop - padBottom;
        const candleW = Math.max(1, chartW / klines.length);
        const bodyW = Math.max(1, candleW * 0.7);

        // Price range
        let minP = Infinity, maxP = -Infinity;
        klines.forEach(k => { if (k.low < minP) minP = k.low; if (k.high > maxP) maxP = k.high; });

        // Add order price to range
        const orderPrice = _chartOrder.avgPrice > 0 ? _chartOrder.avgPrice : (_chartOrder.stopPrice > 0 ? _chartOrder.stopPrice : _chartOrder.price);
        if (orderPrice > 0) {
            minP = Math.min(minP, orderPrice * 0.999);
            maxP = Math.max(maxP, orderPrice * 1.001);
        }

        const range = maxP - minP || 1;
        const pxPerPrice = chartH / range;
        const priceToY = p => padTop + (maxP - p) * pxPerPrice;
        const idxToX = i => padLeft + i * candleW + candleW / 2;

        // Grid lines
        const gridLines = 6;
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        for (let i = 0; i <= gridLines; i++) {
            const y = Math.round(padTop + (chartH / gridLines) * i) + 0.5;
            ctx.beginPath(); ctx.moveTo(padLeft, y); ctx.lineTo(W - padRight, y); ctx.stroke();
            const price = maxP - (range / gridLines) * i;
            ctx.fillStyle = '#4a4a4a';
            ctx.font = '10px "JetBrains Mono", monospace';
            ctx.textAlign = 'left';
            ctx.fillText('$' + fmtPrice(price), W - padRight + 6, y + 3);
        }

        // Time labels
        const timeStep = Math.max(1, Math.floor(klines.length / 8));
        ctx.fillStyle = '#4a4a4a';
        ctx.font = '9px "JetBrains Mono", monospace';
        ctx.textAlign = 'center';
        for (let i = 0; i < klines.length; i += timeStep) {
            const dt = new Date(klines[i].time);
            const label = _chartTF === '1d'
                ? dt.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit' })
                : dt.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
            ctx.fillText(label, idxToX(i), H - 6);
        }

        // Candles
        klines.forEach((k, i) => {
            const x = idxToX(i);
            const isUp = k.close >= k.open;
            const color = isUp ? '#10B981' : '#EF4444';

            // Wick
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(Math.round(x) + 0.5, Math.round(priceToY(k.high)));
            ctx.lineTo(Math.round(x) + 0.5, Math.round(priceToY(k.low)));
            ctx.stroke();

            // Body
            const yOpen = priceToY(k.open);
            const yClose = priceToY(k.close);
            const bodyTop = Math.min(yOpen, yClose);
            const bodyH = Math.max(1, Math.abs(yClose - yOpen));
            if (isUp) {
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.strokeRect(Math.round(x - bodyW / 2) + 0.5, Math.round(bodyTop) + 0.5, Math.round(bodyW), Math.round(bodyH));
            } else {
                ctx.fillStyle = color;
                ctx.fillRect(Math.round(x - bodyW / 2), Math.round(bodyTop), Math.round(bodyW), Math.round(bodyH));
            }
        });

        // ── Order marker ──
        const orderTime = _chartOrder.time || _chartOrder.updateTime || 0;
        // Find closest candle
        let orderIdx = -1;
        let minDist = Infinity;
        klines.forEach((k, i) => {
            const dist = Math.abs(k.time - orderTime);
            if (dist < minDist) { minDist = dist; orderIdx = i; }
        });

        if (orderIdx >= 0 && orderPrice > 0) {
            const ox = idxToX(orderIdx);
            const oy = priceToY(orderPrice);
            const isBuy = _chartOrder.side === 'BUY';

            // Vertical dashed line
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(196,181,253,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(Math.round(ox) + 0.5, padTop);
            ctx.lineTo(Math.round(ox) + 0.5, H - padBottom);
            ctx.stroke();
            ctx.setLineDash([]);

            // Horizontal price line
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = isBuy ? 'rgba(34,211,238,0.5)' : 'rgba(245,158,11,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padLeft, Math.round(oy) + 0.5);
            ctx.lineTo(W - padRight, Math.round(oy) + 0.5);
            ctx.stroke();
            ctx.setLineDash([]);

            // Price label on right axis
            ctx.fillStyle = isBuy ? '#22D3EE' : '#F59E0B';
            const priceLabel = '$' + fmtPrice(orderPrice);
            ctx.font = 'bold 10px "JetBrains Mono", monospace';
            const labelW = ctx.measureText(priceLabel).width + 8;
            ctx.fillRect(W - padRight + 2, oy - 8, labelW, 16);
            ctx.fillStyle = '#0a0a0a';
            ctx.textAlign = 'left';
            ctx.fillText(priceLabel, W - padRight + 6, oy + 4);

            // Order marker — diamond
            ctx.save();
            ctx.translate(ox, oy);
            ctx.rotate(Math.PI / 4);
            ctx.fillStyle = isBuy ? 'rgba(34,211,238,0.2)' : 'rgba(245,158,11,0.2)';
            ctx.strokeStyle = isBuy ? '#22D3EE' : '#F59E0B';
            ctx.lineWidth = 2;
            const ds = 8;
            ctx.fillRect(-ds, -ds, ds * 2, ds * 2);
            ctx.strokeRect(-ds, -ds, ds * 2, ds * 2);
            ctx.restore();

            // Label above marker
            ctx.fillStyle = isBuy ? '#22D3EE' : '#F59E0B';
            ctx.font = 'bold 10px "Plus Jakarta Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(_chartOrder.side + ' ' + (_chartOrder.type || '').replace(/_/g, ' '), ox, oy - 16);

            // Time label below
            const orderDt = new Date(orderTime);
            const timeLabel = orderDt.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            ctx.fillStyle = '#C4B5FD';
            ctx.font = '9px "JetBrains Mono", monospace';
            ctx.fillText(timeLabel, ox, H - padBottom + 14);
        }

        // Store for crosshair
        canvas._chartData = { klines, padTop, padBottom, padLeft, padRight, chartW, chartH, candleW, minP, maxP, range, priceToY, idxToX };
    }

    // Crosshair
    const chartCanvas = document.getElementById('chartCanvas');
    chartCanvas.addEventListener('mousemove', function(e) {
        const data = this._chartData;
        if (!data) return;
        const rect = this.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const idx = Math.floor((mx - data.padLeft) / data.candleW);
        if (idx < 0 || idx >= data.klines.length) {
            document.getElementById('chartCrosshair').innerHTML = '';
            return;
        }
        const k = data.klines[idx];
        const isUp = k.close >= k.open;
        const color = isUp ? '#10B981' : '#EF4444';
        const dt = new Date(k.time);
        const dateStr = dt.toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit' }) + ' ' + dt.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('chartCrosshair').innerHTML =
            `<span style="color:var(--text-tertiary);">${dateStr}</span>` +
            `<span>O <span style="color:${color};">${fmtPrice(k.open)}</span></span>` +
            `<span>H <span style="color:${color};">${fmtPrice(k.high)}</span></span>` +
            `<span>L <span style="color:${color};">${fmtPrice(k.low)}</span></span>` +
            `<span>C <span style="color:${color};">${fmtPrice(k.close)}</span></span>` +
            `<span style="color:var(--text-tertiary);">V ${k.volume >= 1000 ? (k.volume/1000).toFixed(1)+'k' : k.volume.toFixed(1)}</span>`;
    });
    chartCanvas.addEventListener('mouseleave', () => {
        document.getElementById('chartCrosshair').innerHTML = '';
    });

    // TF buttons
    document.querySelectorAll('.chart-tf-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            _chartTF = btn.dataset.tf;
            document.querySelectorAll('.chart-tf-btn').forEach(b => b.classList.toggle('active', b === btn));
            loadChartKlines();
        });
    });

    // Close
    document.getElementById('chartClose').addEventListener('click', () => {
        document.getElementById('chartOverlay').classList.remove('open');
        _chartOrder = null;
    });
    document.getElementById('chartOverlay').addEventListener('click', function(e) {
        if (e.target === this) { this.classList.remove('open'); _chartOrder = null; }
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { document.getElementById('chartOverlay').classList.remove('open'); _chartOrder = null; }
    });

    // Resize
    window.addEventListener('resize', () => {
        if (_chartOrder && _chartKlines.length > 0) drawChart();
    });

    // Sortable headers
    document.querySelectorAll('.orders-tbl th.sortable').forEach(th => {
        th.addEventListener('click', () => {
            const key = th.dataset.sort;
            if (sortKey === key) {
                sortDir = sortDir === 'desc' ? 'asc' : 'desc';
            } else {
                sortKey = key;
                sortDir = 'desc';
            }
            document.querySelectorAll('.orders-tbl th.sortable').forEach(h => h.classList.remove('active-sort', 'asc', 'desc'));
            th.classList.add('active-sort', sortDir);
            currentPage = 1;
            applyFilters();
        });
    });

    // Side filter
    document.querySelectorAll('#sideFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            sideFilter = btn.dataset.side;
            document.querySelectorAll('#sideFilters .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
            currentPage = 1;
            applyFilters();
        });
    });

    // Status filter
    document.querySelectorAll('#statusFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            statusFilter = btn.dataset.status;
            document.querySelectorAll('#statusFilters .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
            currentPage = 1;
            applyFilters();
        });
    });

    // Type filter
    document.querySelectorAll('#typeFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            typeFilter = btn.dataset.type;
            document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
            currentPage = 1;
            applyFilters();
        });
    });

    // Time filter
    document.getElementById('timeFilter').addEventListener('change', function() {
        timeFilter = parseInt(this.value);
        currentPage = 1;
        applyFilters();
    });

    // Search
    let searchDebounce;
    document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
            searchQuery = this.value.trim();
            currentPage = 1;
            applyFilters();
        }, 200);
    });

})();
</script>
</body>
</html>
