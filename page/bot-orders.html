<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamato — Ордери</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=robot" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/shared-layout.css">
    <link rel="stylesheet" href="/css/nav-fix.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/scrollbar.css">
    <style>
        .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-size:24px;line-height:1;color:inherit;display:inline-flex;align-items:center;justify-content:center;}

        .app-container {
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: 56px 1fr;
            height: 100vh;
        }
        .header-bar {
            grid-column: 2; grid-row: 1;
            display: flex; align-items: center; gap: 12px;
            padding: 0 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .main-content {
            grid-column: 2; grid-row: 2;
            overflow-y: auto; padding: 24px;
            scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        /* Header */
        .back-btn {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255,255,255,0.06); color: var(--text-secondary);
            text-decoration: none; transition: 0.15s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .page-title { font-size: 18px; font-weight: 700; }
        .admin-badge {
            font-size: 9px; font-weight: 800; letter-spacing: 1px;
            background: rgba(139,92,246,0.15); color: #C4B5FD; border: 1px solid rgba(139,92,246,0.3);
            padding: 3px 8px; border-radius: 6px;
        }
        .symbol-badge {
            font-size: 12px; font-weight: 700; color: var(--accent-primary);
            background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);
            padding: 4px 10px; border-radius: 8px; font-family: 'JetBrains Mono', monospace;
        }
        .header-spacer { flex: 1; }
        .header-count { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .search-box {
            flex: 1; min-width: 200px; max-width: 360px;
            display: flex; align-items: center; gap: 8px;
            background: var(--surface-secondary); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; padding: 0 12px; height: 36px;
            transition: border-color 0.15s;
        }
        .search-box:focus-within { border-color: rgba(139,92,246,0.4); }
        .search-box svg { flex-shrink: 0; color: var(--text-tertiary); }
        .search-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-primary); font-size: 13px; font-family: inherit;
        }
        .search-box input::placeholder { color: var(--text-tertiary); }

        .filter-group { display: flex; gap: 4px; }
        .filter-btn {
            padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03); color: var(--text-secondary);
            font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.15s;
            font-family: inherit; white-space: nowrap;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.06); }
        .filter-btn.active {
            background: rgba(139,92,246,0.15); color: #C4B5FD;
            border-color: rgba(139,92,246,0.3);
        }

        .time-select {
            background: var(--surface-secondary); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px; padding: 6px 10px; color: var(--text-secondary);
            font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
            outline: none; appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23636363' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
            background-repeat: no-repeat; background-position: right 8px center;
            padding-right: 24px;
        }

        /* Stats summary row */
        .stats-row {
            display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .stat-card {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 12px 16px; flex: 1; min-width: 120px;
        }
        .stat-label { font-size: 10px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* Table */
        .orders-card {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; overflow: hidden;
        }
        .orders-table-wrap {
            overflow-x: auto; scrollbar-width: none;
        }
        .orders-table-wrap::-webkit-scrollbar { display: none; }
        .orders-tbl {
            width: 100%; border-collapse: collapse; font-size: 12px;
        }
        .orders-tbl th {
            text-align: left; padding: 12px 14px; font-size: 10px; font-weight: 700;
            color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;
            background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky; top: 0; z-index: 1;
        }
        .orders-tbl th.sortable {
            cursor: pointer; user-select: none; white-space: nowrap;
        }
        .orders-tbl th.sortable::after {
            content: '\21C5'; margin-left: 4px; opacity: 0.3; font-size: 9px;
        }
        .orders-tbl th.sortable.active-sort { color: #C4B5FD; }
        .orders-tbl th.sortable.active-sort.asc::after { content: '\2191'; opacity: 0.8; }
        .orders-tbl th.sortable.active-sort.desc::after { content: '\2193'; opacity: 0.8; }
        .orders-tbl td {
            padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-secondary); vertical-align: middle;
        }
        .orders-tbl tr:hover td { background: rgba(255,255,255,0.02); }
        .orders-tbl .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }

        /* Badges */
        .badge-long { color: #22D3EE; background: rgba(34,211,238,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-short { color: #F59E0B; background: rgba(245,158,11,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-filled { color: #10B981; background: rgba(16,185,129,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-canceled { color: #EF4444; background: rgba(239,68,68,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-new { color: #8CA8FF; background: rgba(140,168,255,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-expired { color: #636363; background: rgba(99,99,99,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-type { color: #C4B5FD; background: rgba(139,92,246,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-tertiary);
            font-size: 14px; font-weight: 500;
        }
        .empty-state svg { margin-bottom: 12px; opacity: 0.3; }

        /* Loading spinner */
        .loading-spinner {
            display: flex; align-items: center; justify-content: center; padding: 60px;
        }
        .loading-spinner::after {
            content: ''; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #C4B5FD; border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pagination */
        .pagination {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 12px; color: var(--text-tertiary);
        }
        .pagination-btns { display: flex; gap: 4px; }
        .page-btn {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03); color: var(--text-secondary);
            cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: 0.15s;
        }
        .page-btn:hover { background: rgba(255,255,255,0.06); }
        .page-btn.active { background: rgba(139,92,246,0.15); color: #C4B5FD; border-color: rgba(139,92,246,0.3); }
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        /* Chart modal backdrop (transparent — no dimming) */
        .chart-backdrop {
            display: none; position: fixed; inset: 0;
            z-index: 999; pointer-events: none;
        }
        .chart-backdrop.open { display: block; }
        /* Order chart modal */
        .chart-overlay {
            display: none; position: fixed;
            top: 60px; left: 80px; width: 680px; height: 420px;
            min-width: 380px; min-height: 260px;
            background: #0e0e0e; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            z-index: 1000; flex-direction: column; overflow: hidden;
        }
        .chart-overlay.open { display: flex; }
        .chart-overlay.fullscreen {
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            border-radius: 0; border: none;
        }
        .chart-overlay-header {
            display: flex; align-items: center; gap: 6px; padding: 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
            cursor: grab; user-select: none; flex-wrap: wrap;
        }
        .chart-overlay-header:active { cursor: grabbing; }
        .chart-overlay-close {
            width: 24px; height: 24px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.06); color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: 0.15s; flex-shrink: 0;
        }
        .chart-overlay-close:hover { background: rgba(239,68,68,0.2); color: #EF4444; }
        .chart-fullscreen-btn, .chart-pin-btn, .chart-toggle-info-btn {
            width: 24px; height: 24px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.06); color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.15s; flex-shrink: 0;
        }
        .chart-fullscreen-btn:hover, .chart-pin-btn:hover, .chart-toggle-info-btn:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }
        .chart-pin-btn.pinned { background: rgba(139,92,246,0.2); color: #C4B5FD; }
        .chart-overlay.pinned { border-color: rgba(139,92,246,0.3); }
        .chart-overlay.pinned .chart-overlay-header { cursor: default; }
        .chart-overlay.pinned .chart-resize-handle { display: none; }
        .chart-overlay-title { font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 4px; flex-shrink: 1; min-width: 0; overflow: hidden; }
        .chart-tf-group { display: flex; gap: 1px; margin-left: 4px; flex-shrink: 0; flex-wrap: wrap; max-width: 380px; }
        .chart-tf-btn {
            padding: 3px 6px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03); color: var(--text-secondary);
            font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'JetBrains Mono', monospace;
            transition: 0.15s; white-space: nowrap;
        }
        .chart-tf-btn:hover { background: rgba(255,255,255,0.06); }
        .chart-tf-btn.active { background: rgba(139,92,246,0.2); color: #C4B5FD; border-color: rgba(139,92,246,0.3); }
        .chart-overlay-body {
            display: flex; flex: 1; min-height: 0; overflow: hidden;
        }
        .chart-canvas-wrap {
            flex: 1; position: relative; min-width: 0;
        }
        .chart-canvas-wrap canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
        }
        .chart-loading {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); z-index: 2;
        }
        .chart-loading::after {
            content: ''; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #C4B5FD; border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        .chart-info-panel {
            width: 200px; flex-shrink: 0; padding: 10px; overflow-y: auto;
            border-left: 1px solid rgba(255,255,255,0.08);
            scrollbar-width: none; transition: width 0.2s, padding 0.2s, opacity 0.2s;
        }
        .chart-info-panel.hidden { width: 0; padding: 0; opacity: 0; overflow: hidden; border: none; }
        .chart-info-panel::-webkit-scrollbar { display: none; }
        .chart-info-panel h4 { font-size: 10px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .info-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 11px; }
        .info-label { color: var(--text-tertiary); font-size: 10px; }
        .info-value { font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
        .chart-toggle-info-btn.active { background: rgba(139,92,246,0.2); color: #C4B5FD; }
        .chart-crosshair-info {
            position: absolute; top: 4px; left: 8px; z-index: 3;
            font-size: 9px; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary);
            pointer-events: none; display: flex; gap: 6px;
        }
        /* Resize handle */
        .chart-resize-handle {
            position: absolute; bottom: 0; right: 0; width: 14px; height: 14px;
            cursor: nwse-resize; z-index: 5;
        }
        .chart-resize-handle::after {
            content: ''; position: absolute; bottom: 3px; right: 3px;
            width: 6px; height: 6px; border-right: 2px solid rgba(255,255,255,0.12);
            border-bottom: 2px solid rgba(255,255,255,0.12);
        }
        .chart-overlay.fullscreen .chart-resize-handle { display: none; }

        /* Bot selector */
        .selector-bot-card {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; overflow: hidden;
        }
        .selector-bot-header {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .selector-bot-name { font-size: 14px; font-weight: 700; }
        .selector-coin-list { display: flex; flex-direction: column; }
        .selector-coin-link {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 18px; text-decoration: none; color: var(--text-secondary);
            font-size: 12px; font-weight: 600; transition: background 0.12s;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .selector-coin-link:last-child { border-bottom: none; }
        .selector-coin-link:hover { background: rgba(139,92,246,0.08); color: var(--text-primary); }
        .selector-coin-dot {
            width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0;
        }
        .selector-coin-dot.active {
            background: var(--color-up); box-shadow: 0 0 6px rgba(16,185,129,0.5);
        }
        .selector-coin-name { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; }

        @media (max-width: 768px) {
            .chart-overlay-body { flex-direction: column; }
            .chart-info-panel { width: auto; max-height: 200px; border-left: none; border-top: 1px solid rgba(255,255,255,0.08); }
            .chart-tf-group { flex-wrap: wrap; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .stats-row { gap: 8px; }
            .stat-card { min-width: 90px; padding: 10px 12px; }
            .stat-value { font-size: 14px; }
            .toolbar { gap: 8px; }
            .search-box { min-width: 150px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header-bar">
        <a class="back-btn" id="backBtn" href="/bots" title="Назад">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="page-title" id="pageTitle">Ордери</span>
        <span class="admin-badge">ADMIN</span>
        <span class="symbol-badge" id="symbolBadge">---</span>
        <div class="header-spacer"></div>
        <span class="header-count" id="headerCount"></span>
    </header>

    <!-- Main -->
    <div class="main-content">
        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="stat-label">Всього</div><div class="stat-value" id="statTotal">-</div></div>
            <div class="stat-card"><div class="stat-label">Виконано</div><div class="stat-value" id="statFilled" style="color:var(--color-up);">-</div></div>

        <div class="toolbar">

        <!-- Table -->

<script src="/js/app.js"></script>
<script>
(function() {
    // Mobile nav
    const mq = window.matchMedia('(max-width: 768px)');
    function toggleMobileNav(e) { const n = document.getElementById('mobileNav'); if (n) n.style.display = e.matches ? 'flex' : 'none'; }
    mq.addEventListener('change', toggleMobileNav); toggleMobileNav(mq);

    // Parse URL
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const lastPart = pathParts[pathParts.length - 1];
    const botId = lastPart && lastPart !== 'bot-orders' && /^\d+$/.test(lastPart) ? lastPart : null;
    const urlParams = new URLSearchParams(window.location.search);
    const symbol = urlParams.get('symbol') || 'BTCUSDT';
    const isSelectorMode = !botId;

    // State
    let allOrders = [];
    let filteredOrders = [];
    let sortKey = 'time';
    let sortDir = 'desc';
    let sideFilter = 'all';
    let statusFilter = 'all';
    let typeFilter = 'all';
    let timeFilter = 0;
    let searchQuery = '';
    let currentPage = 1;
    const perPage = 50;

    // Check admin first
    fetch('/api/auth/me', { credentials: 'include' })
        .then(r => r.ok ? r.json() : null)
        .then(user => {
            if (!user || (user.role !== 'admin' && user.role !== 'moderator')) {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-tertiary);font-size:16px;">Доступ заборонено</div>';
                return;
            }
            if (user?.role === 'admin') {
                const adminLink = document.getElementById('adminNavLink');
                if (adminLink) adminLink.classList.remove('admin-hidden');
            }
            if (isSelectorMode) {
                showBotSelector();
            } else {
                initOrdersView();
            }
        }).catch(() => {});

    // ═══════════════════════════════════════════
    //  BOT SELECTOR MODE (no bot ID)
    // ═══════════════════════════════════════════
    async function showBotSelector() {
        document.getElementById('pageTitle').textContent = 'Ордери — Вибір бота';
        document.getElementById('symbolBadge').style.display = 'none';
        document.getElementById('headerCount').style.display = 'none';
        document.title = 'Yamato — Ордери';
        document.getElementById('backBtn').href = '/admin';

        // Hide orders UI, show selector
        document.querySelector('.main-content').innerHTML = `
            <div class="stats-row" style="margin-bottom:8px;">
                <div class="stat-card" style="flex:none;width:100%;">
                    <div class="stat-label">Виберіть бота та монету для перегляду ордерів</div>
                </div>
            </div>
            <div class="search-box" style="max-width:400px;margin-bottom:16px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="botSearchInput" placeholder="Пошук бота або монети...">
            </div>
            <div id="botSelectorList" style="display:flex;flex-direction:column;gap:8px;">
                <div class="loading-spinner"></div>
            </div>
        `;

        try {
            const res = await fetch('/api/bots/tree', { credentials: 'include' });
            if (!res.ok) throw new Error('Failed');
            const { tree } = await res.json();
            const allBots = tree ? tree.flatMap(c => c.bots || []) : [];

            renderBotSelector(allBots);

            // Search
            document.getElementById('botSearchInput')?.addEventListener('input', function() {
                const q = this.value.toLowerCase().trim();
                renderBotSelector(allBots, q);
            });
        } catch (e) {
            document.getElementById('botSelectorList').innerHTML =
                '<div class="empty-state">Помилка завантаження ботів</div>';
        }
    }

    function renderBotSelector(bots, query) {
        const container = document.getElementById('botSelectorList');
        if (!container) return;

        let filtered = bots;
        if (query) {
            filtered = bots.filter(b => {
                if (b.name.toLowerCase().includes(query)) return true;
                return (b.instruments || []).some(c => (c.symbol || '').toLowerCase().includes(query));
            });
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">Ботів не знайдено</div>';
            return;
        }

        container.innerHTML = filtered.map(b => {
            const coins = b.instruments || [];
            const statusColors = { live: '#10B981', idle: '#8CA8FF', stopped: '#636363', off: '#EF4444' };
            const statusLabels = { live: 'Live', idle: 'Idle', stopped: 'Stopped', off: 'Off' };
            const statusColor = statusColors[b.realStatus] || '#636363';
            const statusLabel = statusLabels[b.realStatus] || 'Off';
            const isLive = b.realStatus === 'live';
            const modeBadge = b.mode === 'test' || b.mode === 'paper'
                ? '<span style="font-size:9px;font-weight:800;background:rgba(245,158,11,0.15);color:#F59E0B;padding:2px 6px;border-radius:4px;margin-left:6px;">PAPER</span>'
                : '<span style="font-size:9px;font-weight:800;background:rgba(16,185,129,0.15);color:#10B981;padding:2px 6px;border-radius:4px;margin-left:6px;">LIVE</span>';

            const coinLinks = coins.length > 0 ? coins.map(c => {
                const sym = c.symbol || c;
                const displaySym = sym.replace(/USDT|BUSD/gi, '');
                const hasOpen = c.hasOpenTrade || false;
                const pnl = c.pnl || 0;
                const pnlColor = pnl > 0 ? 'var(--color-up)' : pnl < 0 ? 'var(--color-down)' : 'var(--text-tertiary)';
                const pnlStr = (pnl > 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2);
                return `<a href="/bot-orders/${b.id}?symbol=${sym}" class="selector-coin-link">
                    <span class="selector-coin-dot${hasOpen ? ' active' : ''}"></span>
                    <span class="selector-coin-name">${displaySym}</span>
                    <span style="font-size:10px;font-weight:700;color:${pnlColor};margin-left:auto;">${pnlStr}</span>
                    <span style="font-size:10px;color:${hasOpen ? 'var(--color-up)' : 'var(--text-tertiary)'};">${hasOpen ? 'Live' : 'Idle'}</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </a>`;
            }).join('') : '<div style="padding:8px 16px;font-size:11px;color:var(--text-tertiary);">Немає монет</div>';

            return `<div class="selector-bot-card">
                <div class="selector-bot-header">
                    <span style="width:8px;height:8px;border-radius:50%;background:${statusColor};flex-shrink:0;${isLive ? 'box-shadow:0 0 6px ' + statusColor + ';' : ''}"></span>
                    <span class="selector-bot-name">${b.name}</span>
                    ${modeBadge}
                    <span style="font-size:10px;color:${statusColor};font-weight:600;margin-left:auto;">${statusLabel}</span>
                    <span style="font-size:10px;color:var(--text-tertiary);">${coins.length} монет</span>
                </div>
                <div class="selector-coin-list">${coinLinks}</div>
            </div>`;
        }).join('');
    }

    // ═══════════════════════════════════════════
    //  ORDERS VIEW MODE (with bot ID)
    // ═══════════════════════════════════════════
    function initOrdersView() {
        document.getElementById('symbolBadge').textContent = symbol.replace(/USDT|BUSD/gi, '/USDT');
        document.title = `Yamato — Ордери ${symbol.replace(/USDT|BUSD/gi, '')}`;

        // Fetch bot name
        fetch(`/api/bots/${botId}/details`, { credentials: 'include' })
            .then(r => r.ok ? r.json() : null)
            .then(d => {
                if (d?.bot?.name) {
                    document.getElementById('pageTitle').textContent = d.bot.name + ' — Ордери';
                    document.getElementById('backBtn').href = '/bot-orders';
                }
            }).catch(() => {});

        loadOrders();
    }

    // Fetch orders
    async function loadOrders() {
        try {
            const res = await fetch(`/api/bots/${botId}/order-history?symbol=${symbol}`, { credentials: 'include' });
            if (!res.ok) throw new Error('Failed');
            const data = await res.json();
            allOrders = data.orders || [];
            applyFilters();
        } catch (e) {
            document.getElementById('ordersBody').innerHTML =
                '<tr><td colspan="10" class="empty-state">Помилка завантаження ордерів</td></tr>';
        }
    }

    function fmtPrice(v) {
        v = parseFloat(v) || 0;
        if (v === 0) return '0';
        if (v >= 1000) return v.toFixed(2);
        if (v >= 1) return v.toFixed(4);
        return v.toPrecision(4);
    }

    function applyFilters() {
        let orders = allOrders.slice();

        // Side filter
        if (sideFilter !== 'all') orders = orders.filter(o => o.side === sideFilter);

        // Status filter
        if (statusFilter !== 'all') orders = orders.filter(o => o.status === statusFilter);

        // Type filter
        if (typeFilter !== 'all') {
            if (typeFilter === 'STOP') {
                orders = orders.filter(o => o.type && (o.type.includes('STOP') && !o.type.includes('TAKE_PROFIT')));
            } else if (typeFilter === 'TP') {
                orders = orders.filter(o => o.type && o.type.includes('TAKE_PROFIT'));
            } else {
                orders = orders.filter(o => o.type === typeFilter);
            }
        }

        // Time filter
        if (timeFilter > 0) {
            const cutoff = Date.now() - timeFilter * 86400000;
            orders = orders.filter(o => (o.time || o.updateTime || 0) >= cutoff);
        }

        // Search
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            orders = orders.filter(o =>
                String(o.orderId).includes(q) ||
                (o.symbol || '').toLowerCase().includes(q) ||
                (o.side || '').toLowerCase().includes(q) ||
                (o.type || '').toLowerCase().replace(/_/g, ' ').includes(q) ||
                (o.status || '').toLowerCase().includes(q)
            );
        }

        // Sort
        const dir = sortDir === 'asc' ? 1 : -1;
        orders.sort((a, b) => {
            let va, vb;
            switch (sortKey) {
                case 'orderId':     va = a.orderId || 0; vb = b.orderId || 0; break;
                case 'symbol':      return dir * (a.symbol || '').localeCompare(b.symbol || '');
                case 'side':        return dir * (a.side || '').localeCompare(b.side || '');
                case 'type':        return dir * (a.type || '').localeCompare(b.type || '');
                case 'price':       va = a.avgPrice > 0 ? a.avgPrice : (a.stopPrice > 0 ? a.stopPrice : (a.price || 0)); vb = b.avgPrice > 0 ? b.avgPrice : (b.stopPrice > 0 ? b.stopPrice : (b.price || 0)); break;
                case 'quantity':    va = a.quantity || 0; vb = b.quantity || 0; break;
                case 'executedQty': va = a.executedQty || 0; vb = b.executedQty || 0; break;
                case 'status':      return dir * (a.status || '').localeCompare(b.status || '');
                default: /* time */ va = a.time || a.updateTime || 0; vb = b.time || b.updateTime || 0;
            }
            return dir * (va - vb);
        });

        filteredOrders = orders;
        updateStats();
        renderTable();
    }

    function updateStats() {
        const total = allOrders.length;
        const filled = allOrders.filter(o => o.status === 'FILLED').length;
        const canceled = allOrders.filter(o => o.status === 'CANCELED').length;
        const newO = allOrders.filter(o => o.status === 'NEW').length;
        const expired = allOrders.filter(o => o.status === 'EXPIRED').length;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statFilled').textContent = filled;
        document.getElementById('statCanceled').textContent = canceled;
        document.getElementById('statNew').textContent = newO;
        document.getElementById('statExpired').textContent = expired;
        document.getElementById('headerCount').textContent = filteredOrders.length + ' з ' + total;
    }

    function renderTable() {
        const body = document.getElementById('ordersBody');
        if (filteredOrders.length === 0) {
            body.innerHTML = `<tr><td colspan="10"><div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                <div>Ордерів не знайдено</div>
            </div></td></tr>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(filteredOrders.length / perPage);
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * perPage;
        const pageOrders = filteredOrders.slice(start, start + perPage);

        body.innerHTML = pageOrders.map((o, pi) => {
            const isBuy = o.side === 'BUY';
            const badgeSide = isBuy ? 'badge-long' : 'badge-short';
            const statusCls = o.status === 'FILLED' ? 'badge-filled'
                : o.status === 'CANCELED' ? 'badge-canceled'
                : o.status === 'NEW' ? 'badge-new'
                : o.status === 'EXPIRED' ? 'badge-expired'
                : 'badge-type';
            const displayPrice = o.avgPrice > 0 ? o.avgPrice : (o.stopPrice > 0 ? o.stopPrice : o.price);
            const execPct = o.quantity > 0 ? Math.round((o.executedQty || 0) / o.quantity * 100) : 0;
            const dt = o.time ? new Date(o.time) : (o.updateTime ? new Date(o.updateTime) : null);
            const dateStr = dt ? dt.toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'2-digit' }) + ' ' + dt.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) : '\u2014';
            const orderType = (o.type || '\u2014').replace(/_/g, ' ');
            return `<tr style="cursor:pointer;" onclick="showOrderByIdx(${start + pi})">
                <td style="padding:6px 4px 6px 10px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C4B5FD" stroke-width="2" style="opacity:0.5;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></td>
                <td style="color:var(--text-tertiary);font-size:11px;white-space:nowrap;">${dateStr}</td>
                <td class="mono" style="font-size:10px;" title="${o.orderId}">${o.orderId}</td>
                <td class="mono">${(o.symbol || '').replace('USDT', '')}</td>
                <td><span class="${badgeSide}">${o.side}</span></td>
                <td><span class="badge-type">${orderType}</span></td>
                <td class="mono">$${fmtPrice(displayPrice)}</td>
                <td class="mono">${parseFloat(o.quantity || 0).toFixed(4)}</td>
                <td class="mono">${execPct > 0 ? execPct + '%' : '\u2014'}</td>
                <td><span class="${statusCls}">${o.status}</span></td>
            </tr>`;
        }).join('');

        // Pagination
        const pagEl = document.getElementById('pagination');
        if (totalPages <= 1) {
            pagEl.innerHTML = `<span>${filteredOrders.length} ордерів</span><span></span>`;
            return;
        }
        let btns = '';
        btns += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">&laquo;</button>`;
        const maxBtns = 7;
        let startP = Math.max(1, currentPage - Math.floor(maxBtns / 2));
        let endP = Math.min(totalPages, startP + maxBtns - 1);
        if (endP - startP < maxBtns - 1) startP = Math.max(1, endP - maxBtns + 1);
        for (let i = startP; i <= endP; i++) {
            btns += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
        }
        btns += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">&raquo;</button>`;
        pagEl.innerHTML = `<span>${start + 1}\u2013${Math.min(start + perPage, filteredOrders.length)} з ${filteredOrders.length}</span><div class="pagination-btns">${btns}</div>`;
    }

    window.goPage = function(p) {
        currentPage = p;
        renderTable();
        document.querySelector('.orders-table-wrap')?.scrollTo(0, 0);
    };

    // ═══════════════════════════════════════════
    //  INTERACTIVE CHART OVERLAY
    // ═══════════════════════════════════════════
    let _chartOrder = null;
    let _chartTF = '15m';
    let _chartKlines = [];       // full kline buffer
    let _showAllOrders = true;   // toggle for showing all orders
    let _showOrderLevels = true; // toggle for order price levels
    let _showVolume = false;     // toggle for volume bars
    let _showInfoPanel = true;   // toggle info side panel
    let _chartPinned = false;    // pin: lock drag/resize
    let _chartViewStart = 0;     // viewport: first visible kline index
    let _chartViewCount = 200;   // viewport: number of visible klines
    let _isDragging = false;
    let _dragStartX = 0;
    let _dragStartViewStart = 0;
    let _mouseX = -1, _mouseY = -1;  // crosshair
    let _fetchingMore = false;
    // Price/time axis drag scaling
    let _priceAxisDrag = false;
    let _priceAxisStartY = 0;
    let _priceAxisStartScale = 1;
    let _priceScale = 1;       // 1 = auto, <1 = zoomed in price, >1 = zoomed out
    let _timeAxisDrag = false;
    let _timeAxisStartX = 0;
    let _timeAxisStartCount = 200;
    const _tfMs = {
        '1s': 1000, '1m': 60000, '3m': 180000, '5m': 300000, '15m': 900000, '30m': 1800000,
        '1h': 3600000, '2h': 7200000, '4h': 14400000, '6h': 21600000, '8h': 28800000, '12h': 43200000,
        '1d': 86400000, '3d': 259200000, '1w': 604800000, '1M': 2592000000
    };
    const padTop = 18, padBottom = 22, padLeft = 6, padRight = 62;

    window.showOrderByIdx = function(idx) {
        if (filteredOrders[idx]) showOrderDetail(filteredOrders[idx]);
    };

    window.showOrderDetail = function(o) {
        const wasOpen = document.getElementById('chartOverlay').classList.contains('open');
        const prevSymbol = _chartOrder?.symbol;
        _chartOrder = o;

        const overlay = document.getElementById('chartOverlay');
        if (!wasOpen && !_chartFullscreen) {
            // Center on screen — compact
            const w = Math.min(680, window.innerWidth - 40);
            const h = Math.min(420, window.innerHeight - 40);
            overlay.style.width = w + 'px';
            overlay.style.height = h + 'px';
            overlay.style.left = Math.max(0, (window.innerWidth - w) / 2) + 'px';

        }

        // Title
        const isBuy = o.side === 'BUY';

        const statusCls = o.status === 'FILLED' ? 'badge-filled' : o.status === 'CANCELED' ? 'badge-canceled' : o.status === 'NEW' ? 'badge-new' : o.status === 'EXPIRED' ? 'badge-expired' : 'badge-type';
        document.getElementById('chartTitle').innerHTML =
            `<span class="${badgeSide}">${o.side}</span>` +
            `<span class="badge-type">${(o.type || '').replace(/_/g, ' ')}</span>` +
